[package]
name = "wasm4pm-compat"
version = "0.1.0"
edition = "2021"
description = "Minimal paper-complete, feature-capped Rust process-evidence crate. Start with compatibility. Graduate to execution."
license = "MIT OR Apache-2.0"
repository = "https://github.com/wasm4pm/wasm4pm-compat"
keywords = ["process-mining", "ocel", "event-log", "evidence", "conformance"]
categories = ["science", "data-structures"]

[lib]
# Doctests require per-doctest nightly feature flags (generic_const_exprs,
# adt_const_params) that don't propagate from the crate root. Running them
# as the default incurs 200+ separate rustc invocations on a nightly compiler.
# Use `cargo test --doc --all-features` as an explicit opt-in gate.
doctest = false

[features]
# Public feature surface is EXACTLY three. No per-format flags.
# Nightly toolchain required — see rust-toolchain.toml.
default = ["formats"]

# formats: Import/export contracts, round-trip claims, and loss surfaces.
# Enable this for any code that crosses format boundaries (OCEL↔XES, etc.)
# This is the default feature — most users should leave it enabled.
formats = []

# strict: Opt-in boundary judgment with stricter admission/refusal surfaces.
# Enable for production pipelines that require verified export boundaries.
# Adds the `strict` module with `ExportBoundaryConst` and related types.
strict = []

# wasm4pm: Graduation bridge traits toward the wasm4pm execution engine.
# Enable when building a wasm4pm adapter that consumes compat types.
# Adds the `graduation` module exposing the bridge trait surfaces.
wasm4pm = []

[dependencies]

[dev-dependencies]
trybuild = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "zero_cost_types"
harness = false

[[bench]]
name = "law_bounds_bench"
harness = false

[[bench]]
name = "evidence_lifecycle_bench"
harness = false

[[bench]]
name = "id_operations_bench"
harness = false
