         Example:
         compat:Ocel20 dct:conformsTo <https://www.ocel-standard.org/> .
         
    - |
      6. ADD owl:imports statements for stable standards (Dublin Core, Prov-O).
         Update audit-machinery.ttl and wasm4pm-compat.ttl ontology headers.

  deferred_actions:
    - |
      When OCEL 2.0 RDF is published:
        - Enable @prefix ocel: <http://purl.org/ocel/2.0/ontology#>
        - Add owl:imports <http://purl.org/ocel/2.0/ontology>
        - Replace compat:OcelLog defs with rdfs:subClassOf ocel:ObjectCentricEventLog
        - Map witness markers to OCEL namespace elements
        
    - |
      When OMG BPMN 2.0 RDF spec stabilizes:
        - Enable @prefix bpmn: <http://www.omg.org/spec/BPMN/2.0.2/ontology#>
        - Add owl:imports <http://www.omg.org/spec/BPMN/2.0.2/ontology>
        - Refine BpmnModel class hierarchy
        - Add witness markers for gateway types (BpmnXorGateway, etc.)
        
    - |
      When POWL 2.0 RDF is published:
        - Enable @prefix powl: <http://purl.org/powl/2.0/ontology#>
        - Add owl:imports <http://purl.org/powl/2.0/ontology>
        - Map compat:PowlNode to powl:Node hierarchy
        
    - |
      When OCPQ RDF spec is published:
        - Enable @prefix ocpq: <http://purl.org/ocpq/ontology#>
        - Add owl:imports <http://purl.org/ocpq/ontology>
        - Map compat:OcpqQuery to ocpq:Query

  permanent_local_definitions:
    - |
      NO RDF standard exists for:
        - XES (IEEE 1849) — RDF ontology unmaintained
        - Petri nets (classical, WF-nets, OC-PNs) — no standard
        - Process trees — research data structure
        - Declare constraint models — active research, variants
        - DFG, Causal nets — process mining artifacts
        - OCPQ predicates — too new/specialized
        
      These REMAIN LOCALLY DEFINED in wasm4pm-compat.ttl with:
        - dct:conformsTo links to standard specs (XES, IEEE, OMG docs)
        - dct:isReferencedBy links to academic papers (Petri, Declare, etc.)
        - rdfs:seeAlso links to community resources (Wikipedia, standard websites)

final_summary: |
  wasm4pm-compat is well-positioned for open-ontologies alignment. The crate 
  already imports W3C standards (RDF, RDFS, OWL, SHACL, Prov-O, Dublin Core). 
  
  KEY FINDINGS:
  
  1. Process/Event/Object classes: PARTIALLY in open-ontologies via BFO/DOLCE 
     (abstract), but domain-specific classes (EventLog, OcelLog, Trace) require 
     OCEL 2.0 RDF, which is emerging.
  
  2. Namespace prefix reuse: YES, for standards with published RDF specs 
     (OCEL, BPMN, POWL, OCPQ). Define local prefixes now; enable imports 
     when specs stabilize.
  
  3. Process mining standards: OCEL 2.0 (100% coverage locally), Petri nets 
     (95% coverage locally), BPMN 2.0 (70% coverage locally), XES 1849 (95% 
     coverage locally). All major standards are structurally covered.
  
  4. Import core classes: YES, when RDF ontologies are published. Priority: 
     (1) OCEL 2.0, (2) BPMN 2.0, (3) POWL 2.0, (4) OCPQ. Petri nets, XES, 
     and research structures remain local.
  
  NEXT STEPS:
  
  1. Contact OCEL, OMG, POWL authors to accelerate RDF ontology publication
  2. Update wasm4pm-compat.ttl with namespace declarations + dct/prov metadata
  3. Create import-readiness checklist for each standard
  4. Monitor standards evolution and update alignment annually

