# ==============================================================================
# SECTION 1: PROCESS & EVENT CORE CLASSES
# ==============================================================================

process_event_core:
  question_1: "Are process/event/object classes in open-ontologies?"
  answer: |
    PARTIAL. Open-ontologies (via BFO, DOLCE, UFO) define abstract Process, 
    Event, and Object as foundational entities, but do NOT define process-mining-specific 
    concepts (event logs, process models, traces). Process mining requires domain-specific 
    ontologies (OCEL, BPMN, Petri nets). See alignment matrix below.

  alignment_matrix:
    # Core process mining concepts — process/event/object layers
    
    - compat_class: "compat:EventLog"
      rust_type: "EventLog"
      open_ontologies_equivalent: "ocel:EventLog (OCEL 2.0 spec, domain-specific)"
      recommendation: "REUSE via owl:equivalentClass"
      reasoning: |
        EventLog is the foundational log structure. OCEL 2.0 standard 
        (ISO/IEC 30622 status) defines EventLog as a collection of events 
        and object instances. Align compat:EventLog to ocel:EventLog 
        (when OCEL ontology is published in purl.org/ocel).
      namespace_prefix: "ocel"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#EventLog"
      import_action: "YES — core abstraction"
      maturity: "STABLE (OCEL 2.0 finalized)"

    - compat_class: "compat:OcelLog"
      rust_type: "OcelLog"
      open_ontologies_equivalent: "ocel:ObjectCentricEventLog (OCEL 2.0)"
      recommendation: "REUSE as subclass"
      reasoning: |
        OcelLog is the OCEL 2.0-specific shape (Event + Object instances + Links). 
        Map to ocel:ObjectCentricEventLog with witness markers 
        (OcelObjectType, OcelEventType, OcelAttributeType) as distinct sub-authorities.
      namespace_prefix: "ocel"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#ObjectCentricEventLog"
      import_action: "YES — domain standard"
      maturity: "STABLE"

    - compat_class: "compat:Event"
      rust_type: "Event (within EventLog)"
      open_ontologies_equivalent: "ocel:Event (OCEL spec)"
      recommendation: "REUSE"
      reasoning: |
        Event is a trace/lifecycle element. Align to ocel:Event + xes:XESEvent 
        for dual-standard support (OCEL + XES).
      namespace_prefix: "ocel, xes"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#Event"
      import_action: "YES"
      maturity: "STABLE"

    - compat_class: "compat:Object (in OCEL context)"
      rust_type: "ObjectInstance (implicit in OcelLog)"
      open_ontologies_equivalent: "ocel:ObjectInstance (OCEL 2.0)"
      recommendation: "DEFINE LOCALLY (OCEL ontology may not expose fine-grained object classes)"
      reasoning: |
        OCEL 2.0 defines object instances in the flat JSON schema, but 
        the RDF ontology (if published) may not have a dedicated Object class. 
        Keep compat:ObjectInstance locally with a subClassOf rdfs:Resource 
        and cross-link to ocel:ObjectInstance URI if available.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#ObjectInstance (if exists)"
      import_action: "DEFER — wait for OCEL RDF spec"
      maturity: "IN-PROGRESS (OCEL RDF version TBD)"

    - compat_class: "compat:XesLog"
      rust_type: "XesLog"
      open_ontologies_equivalent: "xes:XESLog (IEEE 1849-2016 RDF binding)"
      recommendation: "IMPORT if available; otherwise DEFINE LOCALLY"
      reasoning: |
        XES (IEEE 1849-2016) has an XML schema but RDF ontology is limited. 
        The xes: namespace (http://www.win.tue.nl/xes/) is historical and 
        unmaintained. Define compat:XesLog locally and provide rdfs:seeAlso link 
        to IEEE 1849 specification URL.
      namespace_prefix: "xes (external, unmaintained)"
      purl_candidate: "http://purl.org/xes/ (proposed, not standard)"
      import_action: "NO — define locally with owl:sameAs bridge"
      maturity: "STABLE (standard frozen at 2016)"

    - compat_class: "compat:Trace"
      rust_type: "Trace"
      open_ontologies_equivalent: "ocel:Trace (OCEL 2.0) | xes:Trace (migrated)"
      recommendation: "REUSE via owl:equivalentClass to ocel:Trace"
      reasoning: |
        A Trace is a sequence of Events. OCEL 2.0 formalizes this as a 
        trace ID → sequence of event refs. Map compat:Trace to ocel:Trace 
        with a qualifier marking the standard version.
      namespace_prefix: "ocel"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#Trace"
      import_action: "YES — domain standard"
      maturity: "STABLE"

  # Object-centric specifics
    - compat_class: "compat:EventObjectLink"
      rust_type: "EventObjectLink"
      open_ontologies_equivalent: "ocel:E2O (Event-to-Object link, OCEL 2.0)"
      recommendation: "REUSE"
      reasoning: |
        EventObjectLink represents the OCEL E2O relationship (event → object). 
        Directly map to ocel:E2O or ocel:EventToObjectLink.
      namespace_prefix: "ocel"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#E2O"
      import_action: "YES"
      maturity: "STABLE"

    - compat_class: "compat:ObjectObjectLink"
      rust_type: "ObjectObjectLink"
      open_ontologies_equivalent: "ocel:O2O (Object-to-Object link, OCEL 2.0)"
      recommendation: "REUSE"
      reasoning: |
        ObjectObjectLink represents OCEL O2O relationships (object → object). 
        Map to ocel:O2O or ocel:ObjectToObjectLink.
      namespace_prefix: "ocel"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#O2O"
      import_action: "YES"
      maturity: "STABLE"

    - compat_class: "compat:ObjectChange"
      rust_type: "ObjectChange"
      open_ontologies_equivalent: "ocel:StateChange (OCEL 2.0 object state attribute updates)"
      recommendation: "DEFINE LOCALLY (OCEL may not have dedicated StateChange class)"
      reasoning: |
        ObjectChange tracks attribute mutations on an object instance. 
        OCEL 2.0 includes state attributes but may not expose a StateChange concept 
        in the RDF ontology. Define compat:ObjectChange locally with 
        rdfs:seeAlso link to OCEL object-state section.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#ObjectStateChange (if defined)"
      import_action: "DEFER — wait for OCEL RDF spec clarity"
      maturity: "PARTIAL"

  # Process and lifecycle concepts
    - compat_class: "compat:ProcessForm"
      rust_type: "ProcessForm (base class)"
      open_ontologies_equivalent: "bfo:Process (BFO — Basic Formal Ontology)"
      recommendation: "LINK via rdfs:seeAlso (do NOT subclass — different scope)"
      reasoning: |
        BFO defines Process as an abstract spatio-temporal entity. compat:ProcessForm 
        is a Rust typestate carrier, not a BFO Process. Reference BFO conceptually 
        but do not inherit; they have incompatible semantics (BFO is realist, 
        compat is structural).
      namespace_prefix: "bfo"
      purl_candidate: "http://purl.org/obo/BFO_0000015"  # BFO Process
      import_action: "LINK ONLY — conceptual alignment, no inheritance"
      maturity: "STABLE (BFO 2.0 published)"

    - compat_class: "compat:PetriNet"
      rust_type: "PetriNet"
      open_ontologies_equivalent: "pn:PetriNet (Petri Net RDF/OWL ontology — unmaintained)"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        Petri nets have no official PURL-hosted RDF ontology. The PN community 
        uses ad-hoc XML/JSON schemas. Define compat:PetriNet locally with 
        witness markers (WfNetSoundnessPaper, OcPetriNets) and provide rdfs:seeAlso 
        link to van der Aalst's foundational work.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/petri-net/ontology# (not standard)"
      import_action: "NO — define locally"
      maturity: "ACTIVE (academic, no standard RDF)"

    - compat_class: "compat:WfNetConst<SOUNDNESS>"
      rust_type: "WfNetConst"
      open_ontologies_equivalent: "pn:WorkflowNet (if Petri ontology exists) | local"
      recommendation: "DEFINE LOCALLY with const-generic soundness tokens"
      reasoning: |
        WF-nets are a specialized Petri net class with soundness guarantees. 
        No published RDF ontology covers const-generic type-level soundness tokens. 
        Define compat:WfNetConst locally and document the witness path 
        (SoundnessUnknown → SoundnessClaimed → SoundnessWitnessed).
      namespace_prefix: "compat (local)"
      purl_candidate: "N/A"
      import_action: "NO"
      maturity: "LOCAL INNOVATION"

    - compat_class: "compat:ObjectCentricPetriNet"
      rust_type: "ObjectCentricPetriNet"
      open_ontologies_equivalent: "oc:OCPetriNet (Object-Centric PN — unmaintained RDF)"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        Object-centric Petri nets (van der Aalst & Berti, 2020) have no official 
        RDF ontology. The paper defines the syntax informally. Keep compat:ObjectCentricPetriNet 
        locally with witness markers (ObjectCentricPetriNetPaper, OcPetriNets) and link 
        to the paper DOI.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/oc-petri-net/ontology# (not standard)"
      import_action: "NO"
      maturity: "ACTIVE RESEARCH"

    - compat_class: "compat:BpmnModel"
      rust_type: "BpmnModel"
      open_ontologies_equivalent: "bpmn:Process (BPMN 2.0 RDF, OMG-backed)"
      recommendation: "IMPORT when BPMN RDF ontology becomes stable"
      reasoning: |
        BPMN 2.0 (OMG) is formally specified. RDF/OWL bindings exist but are 
        fragmented (ISO 19510). The most stable is the RDF@ serialization 
        from the OMG Modeling & Ontology SIG. Map compat:BpmnModel to bpmn:Process 
        with subclasses for BpmnTask, BpmnGateway, BpmnEvent via witness markers.
      namespace_prefix: "bpmn"
      purl_candidate: "http://www.omg.org/spec/BPMN/2.0.2/ontology#Process"
      import_action: "DEFER — wait for stable OMG RDF spec"
      maturity: "IN-PROGRESS (OMG working on RDF spec)"

    - compat_class: "compat:ProcessTree"
      rust_type: "ProcessTree"
      open_ontologies_equivalent: "N/A — process trees are research-specific"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        Process trees (Inductive Miner output) are a Rust research data structure 
        with no published RDF standard. Define compat:ProcessTree locally with 
        ProcessTreeOperator witnesses and link to Leemans et al. papers.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/process-tree/ontology# (not standard)"
      import_action: "NO"
      maturity: "LOCAL RESEARCH"

    - compat_class: "compat:PowlNode"
      rust_type: "PowlNode"
      open_ontologies_equivalent: "powl:Node (POWL 2.0 RDF — emerging standard)"
      recommendation: "IMPORT when POWL 2.0 RDF ontology is published"
      reasoning: |
        POWL (Partially Ordered Workflow Language, Kourani & van Zelst 2023) 
        is a formal language with a proposed RDF binding. The ontology is in development. 
        Once published at http://purl.org/powl/2.0/ontology#, map compat:PowlNode to powl:Node 
        with PowlNodeKind witnesses.
      namespace_prefix: "powl"
      purl_candidate: "http://purl.org/powl/2.0/ontology#Node"
      import_action: "YES (deferred until POWL RDF stable)"
      maturity: "EMERGING (2023, RDF TBD)"

    - compat_class: "compat:DeclareModel"
      rust_type: "DeclareModel"
      open_ontologies_equivalent: "declare:Model (Declare constraint family — no RDF standard)"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        Declare (constraint family, Pesic & van der Aalst 2006) has no official 
        RDF ontology. Define compat:DeclareModel locally with witness markers 
        for individual constraint templates (Response, Precedence, ChainSuccession) 
        and link to the Declare specification.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/declare/ontology# (not standard)"
      import_action: "NO"
      maturity: "ACTIVE RESEARCH"

    - compat_class: "compat:DfgShape"
      rust_type: "DirectlyFollowsGraph"
      open_ontologies_equivalent: "dfg:Graph (no standard RDF)"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        DFG (Directly-Follows Graph, including OC-DFG) is a process mining 
        mining artifact with no published RDF ontology. Define compat:DfgShape 
        locally and document the edge/node semantics.
      namespace_prefix: "compat (local)"
      purl_candidate: "N/A"
      import_action: "NO"
      maturity: "LOCAL"

    - compat_class: "compat:CausalNet"
      rust_type: "CausalNet"
      open_ontologies_equivalent: "hn:CausalNet (Heuristics Miner output — no RDF standard)"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        Causal nets (Heuristics Miner, Weijters et al.) have no published RDF 
        ontology. Define compat:CausalNet locally with dependency and threshold 
        semantics.
      namespace_prefix: "compat (local)"
      purl_candidate: "N/A"
      import_action: "NO"
      maturity: "LOCAL"

  # Conformance and analysis
    - compat_class: "compat:ConformanceVerdict"
      rust_type: "ConformanceVerdict"
      open_ontologies_equivalent: "conf:Verdict (no standard RDF) | ocel:ConformanceMetric (proposed)"
      recommendation: "DEFINE LOCALLY"
      reasoning: |
        Conformance verdicts (Fitness, Precision, F1) are domain-specific to 
        process mining. No RDF standard covers conformance metrics. Define locally 
        and link witness markers (AlignmentPaper, ConformanceWitness) to publications.
      namespace_prefix: "compat (local)"
      purl_candidate: "http://purl.org/ocel/2.0/ontology#ConformanceMetric (if defined)"
      import_action: "NO — define locally"
      maturity: "LOCAL"

    - compat_class: "compat:OcpqQuery"
      rust_type: "OcpqQuery"
      open_ontologies_equivalent: "ocpq:Query (OCPQ — Object-Centric Process Querying, emerging)"
      recommendation: "IMPORT when OCPQ RDF ontology is published"
      reasoning: |
        OCPQ (2024) is a formal query language for object-centric logs. 
        An RDF ontology is in development. Once available at http://purl.org/ocpq/ontology#, 
        import and map compat:OcpqQuery to ocpq:Query.
      namespace_prefix: "ocpq"
      purl_candidate: "http://purl.org/ocpq/ontology#Query"
      import_action: "YES (deferred until OCPQ RDF stable)"
      maturity: "EMERGING (2024)"

# ==============================================================================
# SECTION 2: WITNESS MARKERS & STANDARDS ALIGNMENT
# ==============================================================================

witness_markers:
  question_2: "Can we reuse namespace prefixes?"
  answer: |
    PARTIAL YES. The standards (OCEL, XES, BPMN, POWL) have published 
    specifications and emerging RDF ontologies. Some are stable (OCEL 2.0, XES 1849), 
    others are in progress (POWL 2.0, OCPQ, BPMN RDF). Define a unified witness 
    marker namespace linking each standard to its canonical PURL and specification URL.

  witness_to_standard_mapping:
    - witness: "Ocel20"
      key: "ocel-2.0"
      standard_authority: "OCEL 2.0 (ISO/IEC 30622 process)"
      standard_url: "https://www.ocel-standard.org/"
      rdf_ontology: "http://purl.org/ocel/2.0/ontology# (proposed)"
      stability: "STABLE — standard finalized 2023"
      recommendation: "REUSE prefix `ocel:` — import when RDF available"

    - witness: "Xes1849"
      key: "xes-1849-2016"
      standard_authority: "IEEE 1849-2016 (XES)"
      standard_url: "https://xes-standard.org/"
      rdf_ontology: "http://purl.org/xes/ontology# (not standard, historical)"
      stability: "STABLE — standard frozen 2016"
      recommendation: "DEFINE LOCALLY — XES RDF unmaintained. Provide owl:sameAs bridge."

    - witness: "PowlPaper"
      key: "powl-paper"
      standard_authority: "POWL 2.0 (Kourani & van Zelst, 2023)"
      standard_url: "https://powl-language.org/ (if available)"
      rdf_ontology: "http://purl.org/powl/2.0/ontology# (proposed)"
      stability: "EMERGING — formal spec available, RDF TBD"
      recommendation: "IMPORT when POWL 2.0 RDF ontology is published"

    - witness: "WfNetSoundnessPaper"
      key: "wfnet-soundness-paper"
      standard_authority: "van der Aalst 1998 — foundational, no standard"
      standard_url: "https://doi.org/10.1007/BFb0053251 (paper DOI)"
      rdf_ontology: "N/A — no RDF standard"
      stability: "STABLE — academic reference"
      recommendation: "DEFINE LOCALLY — link to paper via dct:isReferencedBy"

    - witness: "BpmnModel"
      key: "bpmn-2.0"
      standard_authority: "BPMN 2.0 (OMG ISO 19510)"
      standard_url: "https://www.omg.org/spec/BPMN/2.0.2/"
      rdf_ontology: "http://www.omg.org/spec/BPMN/2.0.2/ontology# (in development)"
      stability: "STABLE spec, RDF spec IN-PROGRESS"
      recommendation: "IMPORT when OMG publishes stable BPMN RDF spec"

    - witness: "OcelObjectType"
      key: "ocel-object-type"
      standard_authority: "OCEL 2.0 namespace — object type authority"
      standard_url: "https://www.ocel-standard.org/"
      rdf_ontology: "http://purl.org/ocel/2.0/ontology#ObjectType (sub-class)"
      stability: "STABLE"
      recommendation: "IMPORT when OCEL RDF available"

    - witness: "OcelEventType"
      key: "ocel-event-type"
      standard_authority: "OCEL 2.0 namespace — event type (activity) authority"
      standard_url: "https://www.ocel-standard.org/"
      rdf_ontology: "http://purl.org/ocel/2.0/ontology#EventType (sub-class)"
      stability: "STABLE"
      recommendation: "IMPORT when OCEL RDF available"

    - witness: "OcelAttributeType"
      key: "ocel-attribute-type"
      standard_authority: "OCEL 2.0 namespace — attribute domain authority"
      standard_url: "https://www.ocel-standard.org/"
      rdf_ontology: "http://purl.org/ocel/2.0/ontology#AttributeType (sub-class)"
      stability: "STABLE"
      recommendation: "IMPORT when OCEL RDF available"

