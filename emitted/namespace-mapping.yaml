recommended_namespace_prefixes:
  # External standards to import
  ocel:
    uri: "http://purl.org/ocel/2.0/ontology#"
    source: "OCEL 2.0 Standard"
    classes_to_import:
      - "EventLog"
      - "ObjectCentricEventLog"
      - "Event"
      - "ObjectInstance"
      - "Trace"
      - "E2O (EventToObjectLink)"
      - "O2O (ObjectToObjectLink)"
    action: "IMPORT when published"
    stability: "Emerging — request from OCEL governance"

  bpmn:
    uri: "http://www.omg.org/spec/BPMN/2.0.2/ontology#"
    source: "BPMN 2.0 RDF (OMG)"
    classes_to_import:
      - "Process"
      - "Task"
      - "Gateway"
      - "Event"
      - "Pool"
      - "Lane"
    action: "IMPORT when OMG spec stabilizes"
    stability: "In-progress — follow OMG working group"

  powl:
    uri: "http://purl.org/powl/2.0/ontology#"
    source: "POWL 2.0 (Kourani et al.)"
    classes_to_import:
      - "Node"
      - "StrictOrder"
      - "Loop"
      - "XorGateway"
      - "SilentTransition"
    action: "IMPORT when published"
    stability: "Proposed — coordinate with POWL authors"

  ocpq:
    uri: "http://purl.org/ocpq/ontology#"
    source: "OCPQ (2024) — Object-Centric Process Querying"
    classes_to_import:
      - "Query"
      - "Predicate"
      - "Result"
    action: "IMPORT when published"
    stability: "Emerging — new standard (2024)"

  dcterms:
    uri: "http://purl.org/dc/terms/"
    source: "Dublin Core Terms (already in use)"
    classes_to_import:
      - "dct:created"
      - "dct:creator"
      - "dct:isReferencedBy"
      - "dct:conformsTo"
    action: "EXTEND current usage"
    stability: "STABLE"

  prov:
    uri: "http://www.w3.org/ns/prov#"
    source: "W3C Provenance Ontology (already in use)"
    classes_to_import:
      - "prov:Plan"
      - "prov:Activity"
      - "prov:Entity"
      - "prov:wasGeneratedBy"
    action: "EXTEND current usage"
    stability: "STABLE"

  # Research/academic citations (for standards without RDF)
  crossref:
    uri: "https://api.crossref.org/works/"
    source: "Crossref DOI API"
    use_case: "Link witness markers to paper DOIs (non-RDF linking)"
    action: "USE for dct:isReferencedBy values"
    stability: "STABLE"

# ==============================================================================
# SECTION 4: PROCESS MINING STANDARDS COVERAGE
# ==============================================================================

standards_coverage:
  question_3: "What process mining standards (OCEL, BPMN, Petri) are already defined?"
  answer: |
    All three major standards are PARTIALLY covered in wasm4pm-compat.ttl. 
    Event logs (EventLog, OcelLog, XesLog) are defined locally. Petri nets 
    (PetriNet, WfNetConst, ObjectCentricPetriNet) are defined locally with 
    witness markers to papers. BPMN (BpmnModel) is defined locally with 
    incomplete witness coverage. See coverage table below.

  standard: "OCEL 2.0 (Object-Centric Event Log)"
  ocel_coverage:
    - coverage_item: "EventLog (base structure)"
      compat_class: "compat:OcelLog"
      status: "COVERED"
      witness: "Ocel20"
      completeness: "100%"
      notes: |
        OcelLog fully implements OCEL 2.0 JSON schema structure: 
        Event + ObjectInstance + E2O + O2O + ObjectChange. 
        Witness markers for object-type, event-type, and attribute-type namespaces.

    - coverage_item: "Event-Object links (E2O)"
      compat_class: "compat:EventObjectLink"
      status: "COVERED"
      witness: "Ocel20"
      completeness: "100%"
      notes: "EventObjectLink maps to OCEL E2O. Qualified links supported."

    - coverage_item: "Object-Object links (O2O)"
      compat_class: "compat:ObjectObjectLink"
      status: "COVERED"
      witness: "Ocel20"
      completeness: "100%"
      notes: "ObjectObjectLink maps to OCEL O2O. Typed relationships supported."

    - coverage_item: "Object state changes"
      compat_class: "compat:ObjectChange"
      status: "COVERED"
      witness: "Ocel20"
      completeness: "95%"
      notes: |
        ObjectChange covers attribute mutations. OCEL 2.0 state changes 
        semantics (pre/post values) partially covered.

    - coverage_item: "Round-trip guarantee (OCEL JSON ↔ compat)"
      compat_class: "compat:XesLog, compat:OcelLog"
      status: "COVERED"
      witness: "Ocel20"
      completeness: "90%"
      notes: |
        Import/export contracts via src/formats.rs with loss accounting. 
        Minor lossiness on extended attributes.

  standard: "Petri Nets (including WF-nets and Object-Centric variants)"
  petri_coverage:
    - coverage_item: "Classical Petri Net structure (Place, Transition, Arc, Marking)"
      compat_class: "compat:PetriNet"
      status: "COVERED"
      witness: "N/A (no specific paper witness)"
      completeness: "100%"
      notes: |
        PetriNet, Place, Transition, Arc, Marking classes defined. 
        Type-safe structure validation. No soundness checking (graduates to wasm4pm).

    - coverage_item: "Workflow Net (WF-net) soundness"
      compat_class: "compat:WfNetConst<SOUNDNESS>"
      status: "COVERED"
      witness: "WfNetSoundnessPaper"
      completeness: "95%"
      notes: |
        WfNetConst<SOUNDNESS> with three const-generic tokens: 
        SoundnessUnknown (default), SoundnessClaimed, SoundnessWitnessed. 
        Non-forgeable witness path. Soundness verification graduates to wasm4pm.

    - coverage_item: "Object-Centric Petri Nets (OC-PN)"
      compat_class: "compat:ObjectCentricPetriNet"
      status: "COVERED"
      witness: "ObjectCentricPetriNetPaper, OcPetriNets"
      completeness: "90%"
      notes: |
        OC-PN structure (object types, variable arcs, binding elements) 
        defined. Discovery and conformance graduate to wasm4pm.

    - coverage_item: "Separable WF-nets (Kourani et al., 2026)"
      compat_class: "compat:SeparableWfNet<SOUNDNESS>"
      status: "COVERED"
      witness: "SeparableWfNetPaper"
      completeness: "95%"
      notes: |
        Separability is a structural law. Const-generic soundness tokens preserved. 
        WF-net to POWL 2.0 conversion is a separate witness (WfNet2Powl).

    - coverage_item: "Petri Net → POWL 2.0 conversion"
      compat_class: "compat:SeparableWfNet → compat:PowlNode"
      status: "COVERED"
      witness: "WfNet2Powl"
      completeness: "80%"
      notes: |
        Definition 4.1 and Theorem 4.3 of Kourani et al. 2026. Separability 
        is a precondition. Full bidirectional mapping TBD (graduates to wasm4pm).

  standard: "BPMN 2.0 (Business Process Model and Notation)"
  bpmn_coverage:
    - coverage_item: "BPMN elements (Task, Gateway, Event, Pool, Lane)"
      compat_class: "compat:BpmnModel"
      status: "COVERED"
      witness: "N/A (BPMN 2.0 specification coverage is implicit)"
      completeness: "70%"
      notes: |
        BpmnModel defines task, gateway (XOR/AND/OR), event, pool, lane, 
        subprocess, message flow. Gateway type as PhantomData witness. 
        Incomplete witness coverage — no individual gateway-type witnesses.

    - coverage_item: "BPMN gateway types (XOR, AND, OR)"
      compat_class: "compat:BpmnModel (PhantomData witness)"
      status: "PARTIALLY COVERED"
      witness: "BpmnModel only — no witness per gateway type"
      completeness: "60%"
      notes: |
        Gateway type is encoded as a generic parameter, not a witness marker. 
        Recommend adding witness markers: BpmnXorGateway, BpmnAndGateway, 
        BpmnOrGateway for clarity and alignment with BPMN RDF spec.

    - coverage_item: "BPMN subprocesses"
      compat_class: "compat:BpmnModel"
      status: "COVERED"
      witness: "N/A"
      completeness: "85%"
      notes: "Subprocess nesting supported. Recursion depth limits TBD."

    - coverage_item: "BPMN message flows"
      compat_class: "compat:BpmnModel"
      status: "COVERED"
      witness: "N/A"
      completeness: "80%"
      notes: |
        Message flow between pools defined. Cross-pool synchronization semantics 
        graduate to wasm4pm.

  standard: "XES (IEEE 1849-2016 — eXtensible Event Stream)"
  xes_coverage:
    - coverage_item: "XES event log structure"
      compat_class: "compat:XesLog"
      status: "COVERED"
      witness: "Xes1849"
      completeness: "95%"
      notes: |
        XesLog implements IEEE 1849 JSON/XML schema. Trace, Event, Attribute 
        structures. Extensions (lifecycle, concept, resource, org, cost) supported.

    - coverage_item: "XES lifecycle extension"
      compat_class: "compat:XesLog (with lifecycle:transition)"
      status: "COVERED"
      witness: "XesLifecycleExt"
      completeness: "100%"
      notes: |
        Lifecycle:transition values (start, complete, suspend, resume, abort, etc.) 
        validated per IEEE 1849. Distinct witness from Xes1849 base.

    - coverage_item: "XES concept extension"
      compat_class: "compat:XesLog (with concept:name)"
      status: "COVERED"
      witness: "XesConceptExt"
      completeness: "100%"
      notes: |
        Concept:name key validation. Mandatory for well-formed XES. 
        Distinct witness from Xes1849 base.

  standard: "Process mining common structures (DFG, Declare, Process Trees, etc.)"
  additional_coverage:
    - structure: "Directly-Follows Graph (DFG)"
      compat_class: "compat:DfgShape"
      status: "COVERED"
      witness: "N/A"
      completeness: "90%"
      notes: "Edge/node semantics, including OC-DFG. Mining algorithms graduate to wasm4pm."

    - structure: "Declare constraint models"
      compat_class: "compat:DeclareModel"
      status: "COVERED"
      witness: "DeclareFamily, DeclareConstraints"
      completeness: "85%"
      notes: |
        Constraint templates (Response, Precedence, ChainSuccession, etc.) 
        with LTL semantics. Individual constraints as sub-witnesses.

    - structure: "Process trees (Inductive Miner)"
      compat_class: "compat:ProcessTree"
      status: "COVERED"
      witness: "InductiveMiner"
      completeness: "85%"
      notes: |
        Block-structured trees with operators (sequence, exclusive choice, 
        parallel, loop, silent). TypedLoopNode<ARITY> enforces loop arity = 2.

    - structure: "POWL (Partially Ordered Workflow Language)"
      compat_class: "compat:PowlNode"
      status: "COVERED"
      witness: "PowlPaper"
      completeness: "80%"
      notes: |
        POWL nodes with StrictOrder, Loop, XorGateway, SilentTransition, 
        ChoiceGraph kinds. TreeProjectable sealed trait. RDF ontology emerging.

    - structure: "Causal Net (Heuristics Miner output)"
      compat_class: "compat:CausalNet"
      status: "COVERED"
      witness: "N/A"
      completeness: "85%"
      notes: "Causal dependencies and thresholds. Discovery algorithms graduate to wasm4pm."

# ==============================================================================
# SECTION 5: IMPORT RECOMMENDATIONS
# ==============================================================================

import_recommendations:
  question_4: "Can we import core classes instead of redefining?"
  answer: |
    YES, with caveats. OCEL 2.0 classes should be imported when the RDF 
    ontology is published. BPMN 2.0 and POWL 2.0 should be imported when 
    their RDF specs stabilize. Petri nets, process trees, and Declare should 
    remain local (no RDF standards). XES should remain local but bridge to 
    IEEE 1849 spec.

  import_priority_1_immediate:
    - standard: "OCEL 2.0 (when RDF available)"
      classes: ["EventLog", "ObjectCentricEventLog", "Event", "ObjectInstance", "Trace", "E2O", "O2O"]
      action: |
        REQUEST: Contact OCEL governance (ocel-standard.org) to publish RDF 
        ontology at http://purl.org/ocel/2.0/ontology#. Once available, add:
        
        @prefix ocel: <http://purl.org/ocel/2.0/ontology#> .
        
        owl:imports <http://purl.org/ocel/2.0/ontology> ;
        
        Then replace local compat:OcelLog definitions with:
        compat:OcelLog rdfs:subClassOf ocel:ObjectCentricEventLog .
        
      timeline: "6-12 months (estimated OCEL RDF spec delivery)"
      risk: "Medium — depends on external publication"

    - standard: "Dublin Core Terms (already in use)"
      classes: ["dct:created", "dct:creator", "dct:isReferencedBy", "dct:conformsTo"]
      action: |
        EXTEND current usage in audit-machinery.ttl and papers.ttl. Add:
        
        @prefix dct: <http://purl.org/dc/terms/> .
        owl:imports <http://purl.org/dc/terms/> ;
        
        Use dct:conformsTo for standard compliance claims:
        compat:Ocel20 dct:conformsTo <https://www.ocel-standard.org/> .
        
      timeline: "Immediate"
      risk: "Low — Dublin Core is stable and widely used"

    - standard: "W3C Provenance Ontology (already in use)"
      classes: ["prov:Plan", "prov:Activity", "prov:Entity", "prov:wasGeneratedBy"]
      action: |
        EXTEND audit-machinery.ttl imports:
        
        @prefix prov: <http://www.w3.org/ns/prov#> .
        owl:imports <http://www.w3.org/ns/prov-o#> ;
        
        Map audit classes:
        audit:AuditSpec rdfs:subClassOf prov:Plan .
        audit:AuditExecutable rdfs:subClassOf prov:Activity .
        audit:CommitEvidence rdfs:subClassOf prov:EntityBundle .
        
      timeline: "Immediate"
      risk: "Low — W3C Provenance Ontology is stable"

  import_priority_2_emerging:
    - standard: "BPMN 2.0 RDF (when OMG publishes spec)"
      classes: ["Process", "Task", "Gateway", "Event", "Pool", "Lane"]
      action: |
        MONITOR: Follow OMG Modeling and Ontology SIG for BPMN RDF spec.
        When published (likely at http://www.omg.org/spec/BPMN/2.0.2/ontology#):
        
        @prefix bpmn: <http://www.omg.org/spec/BPMN/2.0.2/ontology#> .
        owl:imports <http://www.omg.org/spec/BPMN/2.0.2/ontology> ;
        
        Then:
        compat:BpmnModel rdfs:subClassOf bpmn:Process .
        compat:BpmnTask rdfs:subClassOf bpmn:Task .
        compat:BpmnGateway rdfs:subClassOf bpmn:Gateway .
        
        ADD witness markers for gateway types:
        compat:BpmnXorGateway
          a compat:WitnessMarker ;
          compat:witnessFamily compat:Standard ;
          dct:conformsTo <https://www.omg.org/spec/BPMN/2.0.2/> .
        
      timeline: "12-18 months (estimated OMG RDF spec delivery)"
      risk: "Medium — OMG RDF spec not yet finalized"

    - standard: "POWL 2.0 RDF (when authors publish)"
      classes: ["Node", "StrictOrder", "Loop", "XorGateway", "SilentTransition"]
      action: |
        COORDINATE: Contact POWL authors (Kourani, van Zelst) to publish RDF 
        ontology at http://purl.org/powl/2.0/ontology# (proposed PURL).
        
        Once available:
        @prefix powl: <http://purl.org/powl/2.0/ontology#> .
        owl:imports <http://purl.org/powl/2.0/ontology> ;
        
        Then:
        compat:PowlNode rdfs:subClassOf powl:Node .
        compat:PowlNodeKind rdfs:subClassOf powl:NodeKind .
        
      timeline: "6-12 months (estimated POWL RDF spec delivery)"
      risk: "Medium — depends on author publication"

    - standard: "OCPQ RDF (when spec is published)"
      classes: ["Query", "Predicate", "Result"]
      action: |
        MONITOR: OCPQ (2024) spec is new. Coordinate with authors for RDF 
        ontology publication at http://purl.org/ocpq/ontology# (proposed).
        
        Once available:
        @prefix ocpq: <http://purl.org/ocpq/ontology#> .
        owl:imports <http://purl.org/ocpq/ontology> ;
        
        Then:
        compat:OcpqQuery rdfs:subClassOf ocpq:Query .
        
      timeline: "12-24 months (estimated OCPQ RDF spec delivery)"
      risk: "High — very new standard, RDF timeline uncertain"

  import_priority_3_local_definition:
    - standard: "XES (IEEE 1849-2016)"
      reason: |
        IEEE 1849 is stable but XES RDF ontology is unmaintained. The xes: 
        namespace (http://www.win.tue.nl/xes/) is historical. KEEP XES 
        definitions local but add bridges:
      action: |
        KEEP compat:XesLog locally. ADD owl:sameAs reference:
        
        compat:XesLog
          rdfs:seeAlso <https://xes-standard.org/> ;
          dct:conformsTo <https://standards.ieee.org/standard/1849-2016.html> .
        
        If XES RDF is ever published, add conditional import:
        [ OPTIONAL ]
        @prefix xes: <http://purl.org/xes/ontology#> .
        compat:XesLog owl:sameAs xes:EventLog .
        
      timeline: "Indefinite — XES maintainers dormant"
      risk: "Low — local definitions are self-contained"

    - standard: "Petri Nets (including WF-nets, OC-PNs)"
      reason: |
        No published RDF standard for Petri nets. Academic reference only 
        (van der Aalst et al.). DEFINE LOCALLY with dct:isReferencedBy links.
      action: |
        KEEP compat:PetriNet, compat:WfNetConst, compat:ObjectCentricPetriNet 
        locally. Add metadata:
        
        compat:PetriNet
          rdfs:seeAlso <https://en.wikipedia.org/wiki/Petri_net> ;
          dct:isReferencedBy <https://doi.org/10.1007/BFb0053251> .  # van der Aalst foundational paper
        
        compat:WfNetConst
          dct:isReferencedBy <https://doi.org/10.1007/BFb0053251> .
        
        compat:ObjectCentricPetriNet
          dct:isReferencedBy <https://doi.org/10.1016/j.is.2020.101611> .  # van der Aalst & Berti 2020
        
      timeline: "Indefinite — no RDF standard planned"
      risk: "Low — local definitions are self-contained"

    - standard: "Process Trees (Inductive Miner)"
      reason: "No RDF standard. Research data structure."
      action: |
        KEEP compat:ProcessTree locally. ADD references:
        
        compat:ProcessTree
          dct:isReferencedBy <https://doi.org/10.1145/2365696.2365712> .  # Leemans et al. Inductive Miner paper
        
      timeline: "Indefinite — no RDF standard planned"
      risk: "Low"

    - standard: "Declare (Constraint Models)"
      reason: "No RDF standard. Active research, multiple variants."
      action: |
        KEEP compat:DeclareModel locally. ADD references:
        
        compat:DeclareModel
          dct:isReferencedBy <https://doi.org/10.1145/2208616.2208622> .  # Pesic & van der Aalst 2006
        
      timeline: "Indefinite — no RDF standard planned"
      risk: "Low"

