         Contact: Kourani, van Zelst (POWL 2.0 authors)
         Target PURL: http://purl.org/powl/2.0/ontology#
         Timeline: 6-12 months
         
    - |
      4. UPDATE wasm4pm-compat.ttl namespace declarations.
         Add @prefix declarations for ocel:, bpmn:, powl:, ocpq:, dcterms:, prov:.
         Do NOT import yet (standards TBD) — reserve prefixes for future use.
         
    - |
