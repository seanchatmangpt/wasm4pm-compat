    classification: CLOSED
    severity: HIGH
    established_by: "CROWN_004_GAP_CLOSE_CHECKPOINT.md (criterion 3); ggen/process-tree intelligence"

    problem_statement: |
      Process trees have arity constraints (binary loops: ARITY==2).
      POWL (Partial-Order Workflow Language) has soundness rules.
      Current state: Compile-fail and compile-pass fixtures exist for process_tree.
      Remaining: TreeProjectable sealed trait for projection legality; POWL soundness proofs in types.

    closure_condition: |
      1. [MET] TypedLoopNode<ARITY> with Require<{ ARITY == 2 }> enforced at compile-time — src/process_tree.rs
      2. [MET] TreeProjectable sealed trait: only lawful projections can be compiled — src/powl.rs (assert_tree_projectable)
      3. [MET] Compile-fail fixtures prove wrong arity is rejected — tests/ui/compile_fail/ (process_tree / powl_typed_loop_node arity receipts)
      4. [MET] Compile-fail fixtures prove invalid projections are rejected — tests/ui/compile_fail/witness_ocel_as_powl.rs and projection receipts
      5. [MET] Compile-pass fixtures prove lawful paths are open — tests/ui/compile_pass/powl_typed_loop_node_arity_2.rs, powl_composition_depth_ok.rs
      6. [MET] POWL composition depth const-generic (Kourani 2505.07052 §3) — src/powl.rs MAX_POWL_DEPTH=8 + PowlComposition<Inner, const DEPTH> guarded by Require<{ DEPTH <= MAX_POWL_DEPTH }>: IsTrue
      7. [MET] .stderr receipts match expected error diagnostics — tests/ui/compile_fail/powl_composition_depth_exceeded.stderr cites the DEPTH<=MAX_POWL_DEPTH bound (E0308)

    status: CLOSED
    closure_reason: "All seven conditions met. Arity (TypedLoopNode), projection legality (TreeProjectable sealed trait), and the newly added POWL composition-depth const-generic (PowlComposition<DEPTH> / MAX_POWL_DEPTH) are enforced at compile time with matching .stderr receipts. cargo make alive green."
    closure_evidence:
      - document: "CROWN_004_GAP_CLOSE_CHECKPOINT.md"
        type: "Fixture count"
        content: "220 compile-fail, 411 compile-pass fixtures; process_tree / powl subset verified"
      - source: "src/powl.rs"
        type: "Type law"
        content: "MAX_POWL_DEPTH=8; PowlComposition<Inner, const DEPTH: usize> where Require<{ DEPTH <= MAX_POWL_DEPTH }>: IsTrue; TreeProjectable sealed trait"
      - source: "src/process_tree.rs"
        type: "Type law"
        content: "TypedLoopNode<ARITY> where Require<{ ARITY == 2 }>: IsTrue"
      - fixtures: "tests/ui/compile_fail/powl_composition_depth_exceeded.rs (+.stderr), tests/ui/compile_pass/powl_composition_depth_ok.rs"
        type: "Trybuild receipts"
        content: "Depth > MAX_POWL_DEPTH rejected (stderr cites the bound); depth == 8 compiles"
      - ggen_file: "ggen/intel/projectable-type-ledger.yaml"
        type: "Type ledger"
        content: "Enumeration of projectable and non-projectable types"

    remediation_status: CLOSED
    remediation_phase: "Closed — arity, projection legality, and composition-depth type law complete"
    remaining_work: |
      None within crate scope. Runtime POWL soundness checks (traversing a value to
      verify partial-order soundness) are engine logic and graduate to wasm4pm —
      out of scope for the structure-only crate. The crate enforces the depth ceiling
      as a caller-supplied const-generic, not by computing depth from a value.

