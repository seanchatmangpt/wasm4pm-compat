    remaining_work: |
      1. Enable specta on Tier 1 modules (eventlog, ocel, ids)
      2. Implement witness_key: string encoding for Tier 2 (Evidence<T, S, W> → {value: T, witness_key: string})
      3. Generate .d.ts files via `cargo doc --features ts`
