  - id: GAP_004
    name: "WASM ABI Boundary Enforcement (wasm-bindgen + safety validation)"
    classification: AUTHORIZED
    severity: CRITICAL
    established_by: "GGEN_ECOSYSTEM_INTEL_PARTIAL_001 (criterion 4); ggen/WASM-ABI-INTELLIGENCE.md"

    problem_statement: |
      wasm-bindgen cannot represent generic PhantomData.
      Direct Evidence<T, State, W> export violates memory safety.
      Current state: wasm-boundary-law.yaml defines prohibited patterns; no validation in place.
      No Evidence wrapper type for WASM consumers.

    closure_condition: |
      1. wasm-bindgen bindings generated successfully (wasm-pack build exit 0)
      2. Prohibited patterns validated: no generic Evidence at ABI, no raw state tokens, no witness markers
      3. Allowed pattern: Evidence as witnessed-snapshot wrapper {value: T, witness_key: string}
      4. Witness metadata exported as WITNESS_REGISTRY (not individual markers)
      5. State tokens encoded as return enums (not type parameters)
      6. Memory safety verified: no unsafe type erasure
      7. wasm-pack produces valid .wasm and .d.ts

    status: AUTHORIZED
    closure_reason: "10 supporting files prepared (audits, intelligence, rules, templates); prohibition list documented; awaiting wasm-pack validation"
    closure_evidence:
      - document: "ggen/intel/wasm-boundary-prohibited.yaml"
        type: "Prohibition list"
        content: "Enumerated forbidden patterns at WASM boundary"
      - document: "ggen/rules/wasm-boundary-law.yaml"
        type: "Type-law enforcement"
        content: "Wrapper type requirement and witness encoding strategy"

    remediation_status: STAGED
    remediation_phase: "Parallel to GAP_002 & GAP_003: WASM boundary independent of WIT"
    remaining_work: |
      1. Create wasm-compat module with wrapper types (EvidenceSnapshot, WitnessMetadata)
      2. Implement wasm-bindgen #[wasm_bindgen] on wrapper types
      3. Create WITNESS_REGISTRY singleton for metadata access
      4. Run wasm-pack build and capture diagnostics
      5. Audit boundary against prohibited list (script in ggen/audits/)
      6. Add memory-safety tests (no raw pointers at ABI)
      7. Document WASM boundary contract in README

    dependencies: ["GAP_001"]
    blocks: []
    commit_pattern: "feat(wasm): add WASM ABI boundary enforcement and witness registry"

  - id: GAP_005
    name: "Loss Accounting Rules Enforcement (lossy projections + LossPolicy)"
    classification: CLOSED
    severity: HIGH
    established_by: "CROWN_004_GAP_CLOSE_CHECKPOINT.md (criterion 5.1-5.3); ggen audits"

    problem_statement: |
      Format conversions (OCEL→XES, OCEL→BPMN, etc.) are lossy.
      Current state: OCEL→XES flattening has named LossPolicy types; audit scripts detect loss.
      Partial closure: Loss policies in type signatures; LossReport structure defined.
      Remaining: Auto-detection of loss policies; comprehensive LossReport generation on all paths.

    closure_condition: |
      1. (RE-SCOPED, structure-only) Each named projection binds its loss contract at compile time via Project's associated types (From/To/Lost/Reason) plus a caller-declared LossPolicy decided before loss. Runtime auto-detection of policy from data is engine logic and graduates to wasm4pm — out of scope for the structure-only crate.
      2. LossReport emitted on all lossy paths (not optional)
      3. Named policies enforced: RefuseLoss, AllowNamedProjection, AllowLossWithReport
      4. Audit scripts detect unaccounted loss (no silent structure drop)
      5. Forbid format-to-format direct conversion (must go through compat admission layer)
      6. All format conversions require ProjectionName (e.g., "ocel_to_xes_flattening_minimal_objects")
      7. LossReport<From, To, Items> carries items dropped and reason

    status: CLOSED
    closure_reason: "Loss accounting is type-law complete for the structure-only crate: Project binds From/To/Lost/Reason associated types, LossPolicy is caller-declared before loss, LossReport is non-optional on every non-refusing path, and ~30 loss/projection fixtures plus two audit scripts enforce it. Condition #1 re-scoped: runtime auto-detection is engine logic that graduates to wasm4pm."
    closure_evidence:
