  - id: GAP_007
    name: "WfNet Forgeability Hole (attest_witnessed deprecation)"
    classification: SEALED
    severity: HIGH
    established_by: "CROWN_004_GAP_CLOSE_CHECKPOINT.md (§ Known Nightly Compiler Regression); commit e680e8d"

    problem_statement: |
      WfNet::attest_witnessed() allowed callers to claim witness authority without proof.
      This is a type-law forgery: a module can claim "I checked soundness" without evidence.
      Patch: Deprecate attest_witnessed(); force use of Admit trait instead.

    closure_condition: |
      1. WfNet::attest_witnessed() marked #[deprecated]
