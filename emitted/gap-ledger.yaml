gaps:

  - id: GAP_001
    name: "wasm4pm-compat ↔ wasm4pm Type Bridge (Parallel Universe)"
    classification: CLOSED
    severity: CRITICAL
    established_by: "Process Intelligence ALIVE_001 (governance); GAP_001_CLOSURE.md (design)"

    problem_statement: |
      wasm4pm-compat and wasm4pm maintain two separate type universes:
      - compat: structure-only (Evidence, Admit, Witness, State, Refusal)
      - wasm4pm: execution-only (algorithms, engines, proof gates)
      No bridge exists; a process form (e.g., OcelLog) has no typed path from compat admission to engine execution.
      Witness markers are incompatible: compat uses phantom type tags; wasm4pm uses strings.
      Refusal shapes are incompatible: compat uses named laws; wasm4pm uses error strings.

    closure_condition: |
      1. wasm4pm-types imports all core type shapes from wasm4pm-compat (Evidence, Admit, Witness, State, Refusal, all ID types)
      2. All witness markers flow unchanged from compat to engine receipts via PhantomData
      3. Refusal shapes preserved across boundary (no string flattening where compat provides named laws)
      4. Receipt covenant enforced: compat receipts are immutable foundation; wasm4pm builds on top
      5. ExecutionAdmit trait layers execution on top of compat's Admit (not a replacement)
      6. Integration tests pass: OCEL → admission → graduation → discovery → PetriNet → conformance → receipt

    status: CLOSED
    closure_reason: "docs/GAP_001_CLOSURE.md provides complete type-bridge design; governance authorized; implementation roadmap in place (Phase 1-6)"
    closure_evidence:
      - document: "docs/GAP_001_CLOSURE.md"
        type: "Design & Authorization"
        date: "2026-06-01"
        content: "Section 1-5 cover import strategy, witness bridging, refusal alignment, receipt covenant, graduation boundaries; Section 6 provides Phase 1-6 implementation roadmap"

    remediation_status: PARTIAL
    remediation_phase: "Phase 1 (Import Core Types) — Ready for immediate implementation"
    remaining_work: |
      Phase 1: Add wasm4pm-compat dependency to wasm4pm/Cargo.toml with 'wasm4pm' feature
      Phase 2: Bridge Admit/Refusal traits (Week 2)
      Phase 3: Witness bridging infrastructure (Week 3)
      Phase 4: Receipt extension (Week 4)
      Phase 5: Graduation bridge (Week 5)
      Phase 6: Integration tests (Week 6)

    dependencies: []
    blocks: ["GAP_002", "GAP_003"]
    commit_pattern: "docs(gap): GAP_001 closure plan—compat/wasm4pm type bridge"

  - id: GAP_002
    name: "Component Model WIT Surface Exposure"
    classification: AUTHORIZED
    severity: CRITICAL
    established_by: "GGEN_ECOSYSTEM_INTEL_PARTIAL_001 (criterion 4); ggen/WIT_TEMPLATE_* files"

    problem_statement: |
      wasm4pm-compat defines paper-derived type laws but exposes them only via Rust API.
      Polyglot consumption (Go, TypeScript, Python) requires WebAssembly Component Model (WIT) interfaces.
      Current state: WIT templates exist (ggen/templates/wasm4pm-compat.wit.ggen) but no generated interfaces.
      No witness encoding strategy for WIT (phantom types cannot cross wasm-bindgen boundary).

    closure_condition: |
      1. WIT interfaces generate for all feature gates (base, formats, strict, wasm4pm)
      2. WIT records map cleanly to Rust structs (zero-overhead re-exports)
      3. WIT variants encode named laws (no catch-all Error types)
      4. Witness encoding: phantom type in compat, witness_key string field in WIT record
      5. Resources reserved for engine world only (no state carriers in compat world)
      6. wit-bindgen generates valid trait Guest signatures
      7. Component Model conformance checklist passes

    status: AUTHORIZED
    closure_reason: "GGEN ecosystem provides 14 supporting files (intel, rules, templates, projections); criterion 4 (audit scripts) and criterion 6 (WIT syntax) verified; awaiting implementation"
    closure_evidence:
      - document: "ggen/emitted/gap-ledger.yaml"
        type: "Gap-to-file mapping"
        content: "GAP_COMPONENT mapped to 14 files (intel, rules, templates, projections)"
      - document: "GGEN_ECOSYSTEM_INTEL_PARTIAL_001.md"
        type: "Checkpoint report"
        section: "Criterion 6 (generated artifacts)"
        status: "PARTIAL (WIT templates valid; .d.ts not yet generated)"

    remediation_status: STAGED
    remediation_phase: "Post-GAP_001: requires compat types stable before WIT codegen"
    remaining_work: |
      1. Implement WIT codegen pipeline (cargo-wit or manual tera templates)
      2. Feature-gate each WIT file (base.wit, formats.wit, strict.wit, wasm4pm.wit, all-features.wit)
      3. Generate and validate WIT syntax
      4. Run wit-bindgen to verify trait Guest generation
      5. Add Component Model conformance tests
      6. Document witness encoding strategy in WIT

    dependencies: ["GAP_001"]
    blocks: ["GAP_005", "GAP_006"]
    commit_pattern: "feat(ggen): add WIT codegen pipeline and component boundary enforcement"

  - id: GAP_003
    name: "TypeScript Type Projection (specta + phantom encoding)"
    classification: AUTHORIZED
    severity: CRITICAL
    established_by: "GGEN_ECOSYSTEM_INTEL_PARTIAL_001 (criterion 4); ggen/SPECTA-INTELLIGENCE-INDEX.md"

    problem_statement: |
      Tier-1 modules (eventlog, ocel, ids) are TypeScript-consumable.
      Tier-2 (admission, conformance, receipt, evidence) require wrappers.
      Tier-3 (state tokens, lifecycle markers) should not export.
      Phantom types (PhantomData<W>) cannot be represented in TypeScript.
      Current state: specta is integrated in Cargo.toml; no .d.ts generated.

    closure_condition: |
      1. TypeScript interfaces generated from Rust types via specta (Tier 1 & 2 modules)
      2. Phantom types encoded as witness_key: string fields (not exported as generics)
      3. zero-cost abstraction preserved: wrapper types compile away at runtime
      4. audit-no-dto-flattening.sh passes: no unaccounted field loss
      5. specta codegen produces syntactically valid .d.ts
      6. Branded witness metadata available: Evidence type carries witness_key in JSON
      7. No flattening of nested structures; preserve OCEL E2O and O2O as typed links

    status: AUTHORIZED
    closure_reason: "9 supporting files prepared (audits, intelligence, rules, templates); WIT witness encoding strategy provides blueprint for TS encoding; awaiting codegen implementation"
    closure_evidence:
      - document: "ggen/emitted/gap-ledger.yaml"
        type: "Gap-to-file mapping"
        content: "GAP_TS mapped to 9 files including specta intelligence and projection rules"
      - document: "GGEN_ECOSYSTEM_INTEL_PARTIAL_001.md"
        type: "Checkpoint"
        section: "Criterion 6"
        finding: "TypeScript .d.ts artifacts not yet generated (specta integrated but codegen not run)"

    remediation_status: STAGED
