# anti-llm.toml — per-repo scanner suppressions
# Format documented at: https://wasm4pm.dev/anti-llm-spec
# Each suppression includes a rationale. Do NOT add entries here to silence real cheats.

[claim]
# Canonical type vocabulary that appears in identifiers, doc comments, and display strings.
# Scanner must not treat these as fabricated output claims.
domain_terms = [
  "fully admitted",
  "receipt",
  "candidate",
  "run_id",
  "output_hash",
  "replay_pointer",
  "law_version",
  "ts-projection-law",
  "component-boundary-law",
  "receipt_contents",
  "validation_receipt",
  "GraduationCandidate",
  "StrictViolation",
  "LossPolicy",
  "ProjectionName",
]

[surface]
# Path prefixes where scanner diagnostics are non-blocking.
# These paths contain historical references, documentation, or specification metadata
# that legitimately contain version strings, timestamps, or canonical values.
non_blocking_path_prefixes = [
  "docs/",
  "ggen/audits/",
  "ggen/projections/",
  "receipts/",
]

[surface.suppressions]
# receipts/validation_receipt_detailed.json
# RECEIPT-003: All three CROWN fields (run_id, output_hash, replay_pointer) are present at
# lines 9-11. output_hash uses an all-zeros sha256: sentinel, which is a valid value for a
# validation agent that does not hash build artifacts. replay_pointer is null, which is
# an allowed JSON value for an optional field. Structurally correct; diagnostic is a false positive.
"receipts/validation_receipt_detailed.json" = ["RECEIPT-003"]

# ggen/audits/audit-ts-projection.sh
# CHEAT-C* / VERSION-001: The string `v1.0.0` on lines 4 and 354 is an authority version label
# for `ts-projection-law` — a specification identifier, not a hardcoded computation result or
# fabricated metric. Stable metadata in a rendered audit script.
"ggen/audits/audit-ts-projection.sh" = ["VERSION-001", "CHEAT-C1", "CHEAT-C2"]

# ggen/projections/component.projection.yaml
# VERSION-001: Line 628 `law_version: "component-boundary-law v1.0.0"` is a documentation/metadata
# field naming a law specification version. No code path reads or compares this at runtime.
"ggen/projections/component.projection.yaml" = ["VERSION-001"]

# ggen/projections/ts.projection.yaml
# VERSION-001: Line 317 `timestamp: "2026-06-01T00:00:00Z"` is inside a receipt_contents block
# describing projection specification metadata — a template placeholder, not a manufactured output value.
"ggen/projections/ts.projection.yaml" = ["VERSION-001"]

# ggen/projections/wasm.projection.yaml
# VERSION-001: Line 369 `timestamp: "2026-06-01T00:00:00Z"` is inside a receipt_contents block of a
# YAML projection manifest. A changelog-style timestamp in a config manifest is not a hardcoded oracle.
"ggen/projections/wasm.projection.yaml" = ["VERSION-001"]

[test]
# Paths where structural enum-variant containment checks are the intended test law.
# Scanner must not flag Vec::contains(&EnumVariant) as a string-oracle cheat.
# These fixtures test that typed violations are produced — no computed numeric oracle,
# no seeded RNG output, no Display-string laundering.
structural_check_paths = [
  "tests/ui/compile_pass/",
  "tests/ui/compile_fail/",
  "tests/ui/compile_pass_strict/",
  "tests/strict_contracts.rs",
]

[test.suppressions]
# tests/strict_contracts.rs
# TEST-001: Every flagged call is Vec::contains(&StrictViolation::EnumVariant) — a typed
# membership assertion on enum variants returned by b.check().unwrap_err(). The scanner
# incorrectly matched .contains() without distinguishing Vec<T> from String receiver.
"tests/strict_contracts.rs" = ["TEST-001"]

# tests/ui/compile_pass_strict/strict_boundary_round_trip_fixture_flag.rs
# TEST-001: Lines 24 and 31 call .contains() on Vec<StrictViolation>. The fixture's purpose
# is to prove check() emits StrictViolation::MissingRoundTripFixture when has_round_trip_fixture
# = false. Enum-variant law assertion, not a string oracle.
"tests/ui/compile_pass_strict/strict_boundary_round_trip_fixture_flag.rs" = ["TEST-001"]

# tests/ui/compile_pass_strict/strict_boundary_with_witness.rs
# TEST-001: Lines 33, 42, 43, 44 are enum-variant containment assertions. They verify that
# strict-check logic enumerates the correct named law violations. Identical pattern to lawful
# assertions on lines 23-26. No numeric oracle, no hardcoded metric, no seeded RNG output.
"tests/ui/compile_pass_strict/strict_boundary_with_witness.rs" = ["TEST-001"]

[git]
# git history objects cannot be modified. Scanner must not flag content inside .git/.
non_blocking_path_prefixes = [".git/"]
