[project]
name = "wasm4pm-compat"
version = "26.6.13"
description = "Post-handcoding substrate framework: type law renders everything"
authors = ["Sean Chatman"]
license = "MIT"

[ontology]
source = "ontology/wasm4pm-compat.ttl"
imports = [
  "ontology/papers.ttl",
  "ontology/ggen-substrate.ttl",
  "ontology/audit-machinery.ttl",
  "ontology/zod-types.ttl",
  "ontology-breeds/breed-vocabulary.ttl",
  "ontology-breeds/paper-pointers.ttl",
  "ontology/witnesses-cognition.ttl",
  "ontology/witnesses-rdf.ttl",
  "ontology/witnesses-ai-llm.ttl",
  "ontology/witnesses-domain.ttl",
  "ontology/witnesses-workflow.ttl"
]
standard_only = false

[generation]
output_dir = "/Users/sac/wasm4pm-compat"

# ---------------------------------------------------------------------------
# Rule: witness-markers
# Extracts all WitnessMarker instances and renders the generated witnesses
# module src/generated/witnesses.rs.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "witness-markers"
query = { file = "queries/extract-witnesses-full.rq" }
template = { file = "templates/witness-marker.tera" }
output_file = "src/witnesses.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: witness-corpus
# Aggregates EVERY witness key across all categories into src/witness_corpus.rs
# with a compile-time KEY-uniqueness proof. Closes the authority-collision hole
# that SPARQL dedup alone cannot enforce in Rust source.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "witness-corpus"
query = { file = "queries/extract-all-witness-keys.rq" }
template = { file = "templates/all-witness-keys.tera" }
output_file = "src/witness_corpus.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: compile-fail-fixtures (DISABLED — template references ?witnessA/?witnessB/?rustType
# that are not bound by the SPARQL query; fixtures in tests/ui/compile_fail/ are hand-authored)
# ---------------------------------------------------------------------------
# [[generation.rules]]
# name = "compile-fail-fixtures"
# query = { file = "queries/extract-compile-fail-laws.rq" }
# template = { file = "templates/compile-fail-fixture.tera" }
# output_file = "tests/ui/compile_fail/"
# mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: compile-pass-fixtures
# Extracts CompilePassSurface instances and renders trybuild compile-pass
# fixtures into tests/ui/compile_pass/.
# ---------------------------------------------------------------------------
# compile-pass-fixtures, audit-scripts, audit-feature-isolation, audit-no-dto-flattening,
# audit-no-tools-in-compat, audit-projection-receipts, zod-schemas, open-ontologies-integration:
# DISABLED — all fail with "Failed to render template" after ontology changed 3 days ago.
# The SPARQL queries return different bindings than templates expect (pre-existing break).
# Re-enable after reconciling queries/templates with current ontology.
#
# [[generation.rules]]
# name = "compile-pass-fixtures"
# ...
# [[generation.rules]]
# name = "audit-scripts"
# ...
# (and so on for all 7 rules above)

# [[generation.rules]]
# name = "open-ontologies-merged-ontology"
# query = { file = "queries/construct-integrated-ontology.rq" }
# output_file = "ontology/integrated-open-ontologies.ttl"
# mode = "Overwrite"
# (disabled: CONSTRUCT rule has no template field — ggen requires template for generation rules)

# ---------------------------------------------------------------------------
# Rule: breed-ids
# Derives the canonical TS breed ID constants from breed-vocabulary.ttl.
# Output: packages/cognition/src/breed-ids.ts (Overwrite — fully ontology-derived).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "breed-ids"
query = { file = "queries-breeds/extract-breeds.rq" }
template = { file = "templates-breeds/breed-ids.ts.tera" }
output_file = "/Users/sac/wasm4pm/packages/cognition/src/breed-ids.ts"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: breed-registration
# Derives the breeds! macro invocation and BreedId::ALL array.
# Output: crates/wasm4pm-cognition/src/breeds/registration.rs (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "breed-registration"
query = { file = "queries-breeds/extract-breeds.rq" }
template = { file = "templates-breeds/breed-registration.rs.tera" }
output_file = "/Users/sac/wasm4pm/crates/wasm4pm-cognition/src/breeds/registration.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: registry-json
# Derives the breed registry JSON from ontology fitness evidence.
# Output: crates/wasm4pm-cognition/breeds/registry.json (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "registry-json"
query = { file = "queries-breeds/extract-breeds.rq" }
template = { file = "templates-breeds/registry.json.tera" }
output_file = "/Users/sac/wasm4pm/crates/wasm4pm-cognition/breeds/registry.json"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: paper-pointers-test
# Generates the paper_pointers_generated.rs test suite from paper-pointers.ttl.
# Output: crates/wasm4pm-cognition/tests/paper_pointers_generated.rs (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "paper-pointers-test"
query = { file = "queries-breeds/extract-paper-pointers.rq" }
template = { file = "templates-breeds/paper-pointers-test.tera" }
output_file = "/Users/sac/wasm4pm/crates/wasm4pm-cognition/tests/paper_pointers_generated.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: universal-anticheat
# Generates the universal_anticheat_generated.rs anti-oracle test suite.
# Output: crates/wasm4pm-cognition/tests/universal_anticheat_generated.rs (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "universal-anticheat"
query = { file = "queries-breeds/extract-paper-pointers.rq" }
template = { file = "templates-breeds/universal-anticheat.tera" }
output_file = "/Users/sac/wasm4pm/crates/wasm4pm-cognition/tests/universal_anticheat_generated.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: fresh-name-manifest
# Derives the A8 oracle fresh-name table from compat:freshName predicates.
# Output: src/fresh_names.rs (Overwrite — fully ontology-derived).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "fresh-name-manifest"
query    = { file = "queries-breeds/extract-fresh-names.rq" }
template = { file = "templates-breeds/fresh-name-manifest.rs.tera" }
output_file = "src/fresh_names.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# NOTE: breed-stubs and breed-fixtures are NOT wired here.
# ggen does not support SkipExisting mode — scaffolding new breeds must use
# ggen-breed-scaffold.toml (invoked via `just scaffold-breed <name>`).
# Wiring them here with Overwrite would clobber hand-authored implementations.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Rule: cognition-witnesses
# Renders src/witnesses_cognition.rs from witnesses-cognition.ttl.
# Each entry is a compat:WitnessMarker with paperCategory "cognition".
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "cognition-witnesses"
query = { file = "queries/extract-witnesses-cognition.rq" }
template = { file = "templates/witness-marker-category.tera" }
output_file = "src/witnesses_cognition.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: rdf-witnesses
# Renders src/witnesses_rdf.rs from witnesses-rdf.ttl.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "rdf-witnesses"
query = { file = "queries/extract-witnesses-rdf.rq" }
template = { file = "templates/witness-marker-category.tera" }
output_file = "src/witnesses_rdf.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: ai-llm-witnesses
# Renders src/witnesses_ai_llm.rs from witnesses-ai-llm.ttl.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "ai-llm-witnesses"
query = { file = "queries/extract-witnesses-ai-llm.rq" }
template = { file = "templates/witness-marker-category.tera" }
output_file = "src/witnesses_ai_llm.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: domain-witnesses
# Renders src/witnesses_domain.rs from witnesses-domain.ttl.
# Covers Business_Management, Security_Systems, Maturity_Models, BEAM, General, Root.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "domain-witnesses"
query = { file = "queries/extract-witnesses-domain.rq" }
template = { file = "templates/witness-marker-category.tera" }
output_file = "src/witnesses_domain.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: workflow-witnesses
# Renders src/witnesses_workflow.rs from witnesses-workflow.ttl.
# Covers additional process-mining/workflow papers beyond witness.rs.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "workflow-witnesses"
query = { file = "queries/extract-witnesses-workflow.rq" }
template = { file = "templates/witness-marker-category.tera" }
output_file = "src/witnesses_workflow.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: cognition-breed-witnesses (from breed-vocabulary.ttl directly)
# Renders src/witnesses_breeds.rs from CognitionBreed instances.
# No TTL changes needed — maps breedLabel/breedId to witness_marker!() fields.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "cognition-breed-witnesses"
query = { file = "queries-breeds/extract-breed-witnesses.rq" }
template = { file = "templates-breeds/breed-witness.tera" }
output_file = "src/witnesses_breeds.rs"
mode = "Overwrite"

[inference]
rules = [
  { name = "alive-gate", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o } LIMIT 1" }
]
