[project]
name = "wasm4pm-compat"
version = "26.6.9"
description = "Post-handcoding substrate framework: type law renders everything"
authors = ["Sean Chatman"]
license = "MIT"

[ontology]
source = "ontology/wasm4pm-compat.ttl"
imports = [
  "ontology/papers.ttl",
  "ontology/ggen-substrate.ttl",
  "ontology/audit-machinery.ttl",
  "ontology/zod-types.ttl",
  "ontology-breeds/breed-vocabulary.ttl",
  "ontology-breeds/paper-pointers.ttl"
]
standard_only = false

[generation]
output_dir = "/Users/sac/wasm4pm-compat"

# ---------------------------------------------------------------------------
# Rule: witness-markers
# Extracts all WitnessMarker instances and renders the generated witnesses
# module src/generated/witnesses.rs.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "witness-markers"
query = { file = "queries/extract-witnesses-full.rq" }
template = { file = "templates/witness-marker.tera" }
output_file = "src/witnesses.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: compile-fail-fixtures
# Extracts CompileFailLaw instances and renders one trybuild compile-fail
# fixture per law into tests/ui/compile_fail/.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "compile-fail-fixtures"
query = { file = "queries/extract-compile-fail-laws.rq" }
template = { file = "templates/compile-fail-fixture.tera" }
output_file = "tests/ui/compile_fail/"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: compile-pass-fixtures
# Extracts CompilePassSurface instances and renders trybuild compile-pass
# fixtures into tests/ui/compile_pass/.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "compile-pass-fixtures"
query = { file = "queries/extract-process-forms.rq" }
template = { file = "templates/compile-pass-fixture.tera" }
output_file = "tests/ui/compile_pass/"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-scripts
# Extracts SourceModule instances and renders per-module audit shell scripts
# into scripts/audit/.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-scripts"
query = { file = "queries/extract-source-modules.rq" }
template = { file = "templates/audit-script.tera" }
output_file = "scripts/audit/"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-feature-isolation
# Renders audit-feature-isolation.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-feature-isolation"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-feature-isolation.sh.tera" }
output_file = "audits/audit-feature-isolation.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-no-dto-flattening
# Renders audit-no-dto-flattening.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-no-dto-flattening"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-no-dto-flattening.sh.tera" }
output_file = "audits/audit-no-dto-flattening.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-no-tools-in-compat
# Renders audit-no-tools-in-compat.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-no-tools-in-compat"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-no-tools-in-compat.sh.tera" }
output_file = "audits/audit-no-tools-in-compat.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-projection-receipts
# Renders audit-projection-receipts.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-projection-receipts"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-projection-receipts.sh.tera" }
output_file = "audits/audit-projection-receipts.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: zod-schemas
# Extracts Zod schema metadata and renders bindings/zod_schemas.ts.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "zod-schemas"
query = { file = "queries/extract-zod-schemas.rq" }
template = { file = "templates/zod-schemas.ts.tera" }
output_file = "bindings/zod_schemas.ts"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: open-ontologies-integration
# Validates and integrates open-ontologies pack with wasm4pm-compat canon.
# Produces:
#   1. src/open_ontologies_integration.rs — type bindings
#   2. ontology/integrated-open-ontologies.ttl — merged ontology
# Ensures round-trip compatibility with OCEL/XES/BPMN/Petri formats.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "open-ontologies-integration"
query = { file = "queries/integrate-open-ontologies.rq" }
template = { file = "templates/open-ontologies-integration.tera" }
output_file = "src/open_ontologies_integration.rs"
mode = "Overwrite"

# [[generation.rules]]
# name = "open-ontologies-merged-ontology"
# query = { file = "queries/construct-integrated-ontology.rq" }
# output_file = "ontology/integrated-open-ontologies.ttl"
# mode = "Overwrite"
# (disabled: CONSTRUCT rule has no template field — ggen requires template for generation rules)

# ---------------------------------------------------------------------------
# Rule: breed-ids
# Derives the canonical TS breed ID constants from breed-vocabulary.ttl.
# Output: packages/cognition/src/breed-ids.ts (Overwrite — fully ontology-derived).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "breed-ids"
query = { file = "queries-breeds/extract-breeds.rq" }
template = { file = "templates-breeds/breed-ids.ts.tera" }
output_file = "../wasm4pm/packages/cognition/src/breed-ids.ts"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: breed-registration
# Derives the breeds! macro invocation and BreedId::ALL array.
# Output: crates/wasm4pm-cognition/src/breeds/registration.rs (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "breed-registration"
query = { file = "queries-breeds/extract-breeds.rq" }
template = { file = "templates-breeds/breed-registration.rs.tera" }
output_file = "../wasm4pm/crates/wasm4pm-cognition/src/breeds/registration.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: registry-json
# Derives the breed registry JSON from ontology fitness evidence.
# Output: crates/wasm4pm-cognition/breeds/registry.json (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "registry-json"
query = { file = "queries-breeds/extract-breeds.rq" }
template = { file = "templates-breeds/registry.json.tera" }
output_file = "../wasm4pm/crates/wasm4pm-cognition/breeds/registry.json"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: paper-pointers-test
# Generates the paper_pointers_generated.rs test suite from paper-pointers.ttl.
# Output: crates/wasm4pm-cognition/tests/paper_pointers_generated.rs (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "paper-pointers-test"
query = { file = "queries-breeds/extract-paper-pointers.rq" }
template = { file = "templates-breeds/paper-pointers-test.tera" }
output_file = "../wasm4pm/crates/wasm4pm-cognition/tests/paper_pointers_generated.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: universal-anticheat
# Generates the universal_anticheat_generated.rs anti-oracle test suite.
# Output: crates/wasm4pm-cognition/tests/universal_anticheat_generated.rs (Overwrite).
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "universal-anticheat"
query = { file = "queries-breeds/extract-paper-pointers.rq" }
template = { file = "templates-breeds/universal-anticheat.tera" }
output_file = "../wasm4pm/crates/wasm4pm-cognition/tests/universal_anticheat_generated.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# NOTE: breed-stubs and breed-fixtures are NOT wired here.
# ggen does not support SkipExisting mode — scaffolding new breeds must use
# ggen-breed-scaffold.toml (invoked via `just scaffold-breed <name>`).
# Wiring them here with Overwrite would clobber hand-authored implementations.
# ---------------------------------------------------------------------------

[inference]
rules = [
  { name = "alive-gate", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o } LIMIT 1" }
]
