[project]
name = "wasm4pm-compat"
version = "26.6.5"
description = "Post-handcoding substrate framework: type law renders everything"
authors = ["Sean Chatman"]
license = "MIT"

[ontology]
source = "ontology/wasm4pm-compat.ttl"
additional = [
  "ontology/papers.ttl",
  "ontology/ggen-substrate.ttl",
  "ontology/audit-machinery.ttl"
]
standard_only = false

# ---------------------------------------------------------------------------
# Ontology Pack: open-ontologies
# Integrates standard RDF ontologies for OCEL, XES, BPMN, Petri nets, DFG
# and process-mining vocabularies. Sources: PM4Py, OCEL specification, W3C.
# ---------------------------------------------------------------------------
[[ontology.pack]]
name = "open-ontologies"
namespace = "https://open-ontologies.github.io/"
sources = [
  "https://raw.githubusercontent.com/open-ontologies/ontologies/main/ocel.ttl",
  "https://raw.githubusercontent.com/open-ontologies/ontologies/main/xes.ttl",
  "https://raw.githubusercontent.com/open-ontologies/ontologies/main/bpmn.ttl",
  "https://raw.githubusercontent.com/open-ontologies/ontologies/main/petri.ttl",
  "https://raw.githubusercontent.com/open-ontologies/ontologies/main/dfg.ttl",
  "https://raw.githubusercontent.com/open-ontologies/ontologies/main/event-model.ttl"
]
local_cache = "ontology/.open-ontologies-cache"
allow_remote_fetch = true

[generation]
output_dir = ".."

# ---------------------------------------------------------------------------
# Rule: witness-markers
# Extracts all WitnessMarker instances and renders the generated witnesses
# module src/generated/witnesses.rs.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "witness-markers"
query = { file = "queries/extract-witnesses-full.rq" }
template = { file = "templates/witness-marker.tera" }
output_file = "src/witnesses.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: compile-fail-fixtures
# Extracts CompileFailLaw instances and renders one trybuild compile-fail
# fixture per law into tests/ui/compile_fail/.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "compile-fail-fixtures"
query = { file = "queries/extract-compile-fail-laws.rq" }
template = { file = "templates/compile-fail-fixture.tera" }
output_file = "tests/ui/compile_fail/"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: compile-pass-fixtures
# Extracts CompilePassSurface instances and renders trybuild compile-pass
# fixtures into tests/ui/compile_pass/.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "compile-pass-fixtures"
query = { file = "queries/extract-process-forms.rq" }
template = { file = "templates/compile-pass-fixture.tera" }
output_file = "tests/ui/compile_pass/"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-scripts
# Extracts SourceModule instances and renders per-module audit shell scripts
# into scripts/audit/.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-scripts"
query = { file = "queries/extract-source-modules.rq" }
template = { file = "templates/audit-script.tera" }
output_file = "scripts/audit/"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-feature-isolation
# Renders audit-feature-isolation.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-feature-isolation"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-feature-isolation.sh.tera" }
output_file = "audits/audit-feature-isolation.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-no-dto-flattening
# Renders audit-no-dto-flattening.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-no-dto-flattening"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-no-dto-flattening.sh.tera" }
output_file = "audits/audit-no-dto-flattening.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-no-tools-in-compat
# Renders audit-no-tools-in-compat.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-no-tools-in-compat"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-no-tools-in-compat.sh.tera" }
output_file = "audits/audit-no-tools-in-compat.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: audit-projection-receipts
# Renders audit-projection-receipts.sh from template
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "audit-projection-receipts"
query = { file = "queries/extract-blocking-audits.rq" }
template = { file = "templates/audit-projection-receipts.sh.tera" }
output_file = "audits/audit-projection-receipts.sh"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: open-ontologies-integration
# Validates and integrates open-ontologies pack with wasm4pm-compat canon.
# Produces:
#   1. src/open_ontologies_integration.rs — type bindings
#   2. ontology/integrated-open-ontologies.ttl — merged ontology
# Ensures round-trip compatibility with OCEL/XES/BPMN/Petri formats.
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "open-ontologies-integration"
query = { file = "queries/integrate-open-ontologies.rq" }
template = { file = "templates/open-ontologies-integration.tera" }
output_file = "src/open_ontologies_integration.rs"
mode = "Overwrite"

# [[generation.rules]]
# name = "open-ontologies-merged-ontology"
# query = { file = "queries/construct-integrated-ontology.rq" }
# output_file = "ontology/integrated-open-ontologies.ttl"
# mode = "Overwrite"
# (disabled: CONSTRUCT rule has no template field — ggen requires template for generation rules)

# ---------------------------------------------------------------------------


[inference]
enabled = true
rules = [
  { name = "alive-gate", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o } LIMIT 1" }
]
