# EXPORT STRATEGY SUMMARY
# ============================================================

export_strategy:

  immediate_actions:
    - "Add #[derive(Type)] to all Tier 1 types (Event, Trace, EventLog, OcelAttribute, …)"
    - "Add #[derive(Type, Serialize, Deserialize)] with appropriate #[serde(...)] attrs"
    - "Register types in TypeCollection and emit TypeScript via Typescript::default().export_to()"

  structural_refactors:
    - "Create concrete wrappers: RawEvidence<T>, AdmittedEvidence<T>, etc. instead of Evidence<T, State, W>"
    - "Refactor EventId<K>, ObjectId<K> to EventId (u64 wrapper) or concrete per-log types"
    - "Export Admission<T, W> as Admission<T> with witness_key: String field"

  skip_exports:
    - "All Tier 3 law-enforcement types (Assert, IsTrue, ConditionCell, Metric, Between01)"
    - "Lifecycle stage tokens (Raw, Parsed, Admitted state enums)"
    - "Witness marker enums (Ocel20, Xes1849); use string constants instead"
    - "EvidenceState, Witness trait definitions"

  helper_exports:
    - "Witness metadata registry: fn witness_by_key(key: &str) -> Option<WitnessMetadata>"
    - "Metric getters: fn metric_value(kind: QualityMetricKind, num: u64, den: u64) -> f64"
    - "ID constructors: fn event_id(raw: u64) -> EventId, fn object_id(raw: u64) -> ObjectId"

  feature_gate:
    recommendation: "Add a new feature `ts` (already in Cargo.toml) for all Specta-dependent code"
    cargo_toml_example: |
      [features]
      ts = [
        "dep:specta",
        "dep:serde",
        "dep:serde_json",
      ]
    
    usage: "cargo build --features ts; generates TypeScript bindings during build"

---

# EMIT TARGETS
# ============================================================

emit_targets:

  typescript_bindings:
    output_file: "wasm4pm-compat-types.ts"
    modules_included:
      - eventlog
      - ocel
      - admission (wrapped)
      - loss
      - witness (metadata only)
      - conformance (verdict shapes only)
      - refusals (all enum variants)
    
    module_organization: |
      // wasm4pm-compat-types.ts
      
      // Event log types
      export type Event = { … };
      export type Trace = { … };
      export type EventLog = { … };
      
      // OCEL types
      export type OcelAttributeValue = { … };
      export type OcelEvent = { … };
      export type OcelObject = { … };
      export type OcelLog = { … };
      
      // Admission / Refusal
      export type Admission<T> = { value: T };
      export type Refusal = { reason: string; witness_key: string };
      
      // Loss
      export type LossPolicy = { … };
      export type ProjectionName = string;
      
      // Witness metadata
      export type WitnessFamily = "Standard" | "Paper" | …;
      export type WitnessMetadata = { key: string; family: WitnessFamily; … };
      
      // Quality metrics (value-only)
      export type QualityMetric = { kind: string; num: bigint; den: bigint };
      
      // Witness registry
      export const WITNESSES: Record<string, WitnessMetadata> = { … };

  javascript_helpers:
    output_file: "wasm4pm-compat-helpers.ts"
    exports:
      - "export function eventId(raw: bigint): EventId { … }"
      - "export function objectId(raw: bigint): ObjectId { … }"
      - "export function metric(kind: string, num: bigint, den: bigint): QualityMetric { … }"
      - "export function witnessKey(family: WitnessFamily): string { … }"

---

# MIGRATION PATH
# ============================================================

migration_path:

  phase_1:
    title: "Export Foundation"
    types:
      - Tier 1 simple types (Event, Trace, EventLog)
      - Tier 1 OCEL types (OcelEvent, OcelObject, OcelAttribute)
      - Tier 4 refusal enums
    timeline: "Week 1"
    deliverable: "wasm4pm-compat-types.ts with core domain types"

  phase_2:
    title: "Admission & Loss Accounting"
    types:
      - Tier 2 admission/refusal wrappers (Admission<T>, Refusal)
      - Tier 2 loss shapes (LossPolicy, ProjectionName, LossReport)
    timeline: "Week 2"
    deliverable: "Boundary ceremony types + loss covenants"
    note: "Requires refactoring Evidence<T, State, W> → RawEvidence<T>, etc."

  phase_3:
    title: "ID and Metadata Types"
    types:
      - EventId, ObjectId refactoring (concrete or per-log)
      - Witness metadata registry
      - WitnessFamily enum
    timeline: "Week 3"
    deliverable: "Type-safe ID helpers + witness metadata"

  phase_4:
    title: "Quality Metrics & Conformance"
    types:
      - Conformance verdict shapes (Fitness, Precision, F1, Deviation)
      - Metric value-only wrappers
      - Quality metric registry
    timeline: "Week 4"
    deliverable: "Quality metric type exports + helper functions"
    note: "Metric<KIND, NUM, DEN> not exported; export getters instead"

---

end_of_file: ✅ CANDIDATES COMPLETE
