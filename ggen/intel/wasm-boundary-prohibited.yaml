  │ Create verdicts (not compute)   │ PERMITTED (immut)    │ Structure-only OK │
  │ Export formatted evidence       │ PERMITTED (w/loss)   │ With LossReport   │
  │ Validate structure              │ PERMITTED (immut)    │ Structure-only OK │
  │ Graduation candidate creation   │ PERMITTED            │ Core boundary     │
  └─────────────────────────────────┴──────────────────────┴───────────────────┘

################################################################################
# SECTION 8: THE COVENANT IN ACTION
################################################################################

covenant_enforcement: |
  **"Compat carries the evidence. wasm4pm adjudicates it."**

  When a host (JavaScript consumer) finds itself:
  1. Attempting to discover a model from a log → GraduationCandidate needed
  2. Trying to compute token replay → GraduationCandidate needed
  3. Building an alignment algorithm → GraduationCandidate needed
  4. Running a benchmark → GraduationCandidate needed
  5. Executing an OCPQ query → GraduationCandidate needed

  **The correct response is NOT to implement these in compat.**
  The correct response is:
    pub fn graduation_case_for_X(evidence: &...) -> GraduationCandidate { }

  The host then:
    1. Creates the candidate
    2. Sends it to wasm4pm (the engine)
    3. Receives the result back
    4. Loads the result as a structured verdict/receipt

  This preserves the covenant: compat carries, wasm4pm adjudicates.

