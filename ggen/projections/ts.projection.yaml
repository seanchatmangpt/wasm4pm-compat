---

quality_gates:

  gate_1_type_safety:
    description: "All .d.ts types are structural and compile-safe"
    method: "tsc --strict --noEmit generated/wasm4pm-compat.d.ts"
    passes_if: "No type errors"

  gate_2_witness_completeness:
    description: "All witness constants present in WITNESSES registry"
    method: "Audit WitnessMetadata exported against witness.rs constants"
    passes_if: "~40 witnesses enumerated"

  gate_3_law_projection:
    description: "No type-law enforcement types (Assert, IsTrue, Metric, etc.) exported"
    method: "Parse .d.ts and verify absence of compile-time-only constructs"
    passes_if: "Zero hits on law-enforcement patterns"

  gate_4_no_phantom_exposure:
    description: "No PhantomData, no state tokens, no bare generics at boundary"
    method: "Audit generated bindings against forbidden list"
    passes_if: "All checks pass"

---

