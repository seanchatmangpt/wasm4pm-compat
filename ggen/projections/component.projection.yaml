# Component Model Projection Manifest
# wasm4pm-compat v26.6.9
# Generated: 2026-06-01

---

projection_metadata:
  name: "wasm4pm-compat Component Model Projection"
  alias: "component.projection"
  version: "1.0.0"
  source: "wasm4pm-compat"
  source_lang: "Rust (nightly)"
  target: "WebAssembly Component Model (wasm32-wasip1-component)"
  tool: "wit-bindgen + wit-parser"
  spec_version: "1.0 (MVP)"
  feature_gate: "component (new; future feature flag)"
  stability: "ALPHA (reserved for component model adoption)"
  purpose: "Type-law surface for component linking: structured admission boundaries, loss covenants, graduation bridges, engine world contracts"

---

component_model_principle:
  philosophy: "Components are black boxes with type-safe boundaries; witnessing is runtime metadata in WIT"
  world_split: |
    compat.world (export): Admission gates, loss accounting, strict boundary, graduation
    engine.world (import): Discovery, replay, conformance, OCPQ, receipts
    Linking: compat instance → engine instance (at component link time)
  refusal_encoding: "Named variant enum (DanglingEventObjectLink, InvalidLossPolicy, etc.)"
  witness_encoding: "String tag in returned records (witness-id: 'ocel-2.0')"
  state_encoding: "Lifecycle state as enum variant in return types (admitted, refused, projected, etc.)"

---

compat_wit_exports:

  interfaces:

    types_interface:
      name: "wasm4pm:compat/types@1.0.0"
      kind: "type-only"
      purpose: "Canonical shape definitions shared across all compat interfaces"

      record_definitions:

        event_log:
          wit_definition: |
            record event-log {
              events: list<event>,
              traces: list<trace>,
              metadata: event-log-metadata,
            }
          constraint: "Ordered sequence of events, optionally grouped into traces"

        ocel_log:
          wit_definition: |
            record ocel-log {
              events: list<ocel-event>,
              objects: list<ocel-object>,
              e2o-links: list<event-to-object-link>,
              o2o-links: list<object-to-object-link>,
              object-changes: list<object-change>,
            }
          constraint: "Object-centric model: events, objects, links, state changes"

        xes_log:
          wit_definition: |
            record xes-log {
              traces: list<xes-trace>,
              metadata: xes-metadata,
            }
          constraint: "XES 1.0 (case-centric event log)"

        loss_report:
          wit_definition: |
            record loss-report {
              from-format: string,
              to-format: string,
              items-lost: list<loss-item>,
              summary: string,
            }
          constraint: "Audit trail for lossy transformations"

        process_boundary:
          wit_definition: |
            record process-boundary {
              kind: string,
              name: string,
              has-witness: bool,
              has-round-trip: bool,
            }
          constraint: "Declaration of process boundary judgment"

        witness_info:
          wit_definition: |
            record witness-info {
              key: string,
              family: string,
              title: string,
              year: option<u16>,
            }
          constraint: "Metadata extracted from Witness trait (KEY, FAMILY, TITLE, YEAR)"

        metric:
          wit_definition: |
            record metric {
              kind: string,
              numerator: u64,
              denominator: u64,
              notes: string,
            }
          constraint: "Between01 bounded metric (numerator <= denominator)"

      enum_definitions:

        lifecycle_state:
          wit_definition: |
            enum lifecycle-state {
              raw,        // Pre-parse
              parsed,     // Syntactically valid
              admitted,   // Structurally sound
              refused,    // Admission failed
              projected,  // Lossy transformation
              exportable, // Ready for external format
              receipted,  // Proof generated
            }
          constraint: "One-way state progression (never backward)"

        witness_family:
          wit_definition: |
            enum witness-family {
              standard,
              paper,
              api-grammar,
              rust-law,
              internal-bridge,
            }
          constraint: "Classification of witness authorities"

      variant_definitions:

        refusal_reason:
          wit_definition: |
            variant refusal-reason {
              dangling-event-object-link(record {
                event-id: string,
                object-id: string,
                object-type: string,
              }),
              missing-final-marking(record {
                place-id: string,
                state-id: string,
              }),
              invalid-petri-structure(record {
                violation: string,
                element-id: string,
              }),
              circular-dependency(record {
                cycle: list<string>,
              }),
              hidden-process-mining-growth(record {
                discovered-elements: u32,
                boundary-elements: u32,
              }),
              invalid-loss-policy(record {
                transformation: string,
                policy-required: string,
              }),
              witness-mismatch(record {
                expected: string,
                found: string,
              }),
            }
          constraint: "Every refusal names a specific law; no bare catch-all"

    admission_interface:
      name: "wasm4pm:compat/admission@1.0.0"
      kind: "export"
      functions:

        - function: "admit-event-log"
          signature: |
            func(raw: event-log) -> result<record { value: event-log, witness-id: string }, refusal-reason>
          contract: |
            Input: Raw, unvalidated event log
            Output: (Admitted log + witness tag) OR (named law refusal)
            Witness: Inferred or explicit (depends on implementation)

        - function: "admit-ocel-log"
          signature: |
            func(raw: ocel-log) -> result<record { value: ocel-log, witness-id: string }, refusal-reason>
          contract: |
            Input: Raw OCEL log
            Validates: E2O links, object declarations, structural order
            Witness: 'ocel-2.0' (explicit)
            Refusals: DanglingEventObjectLink, InvalidOcelAttribute, etc.

        - function: "admit-xes-log"
          signature: |
            func(raw: xes-log) -> result<record { value: xes-log, witness-id: string }, refusal-reason>
          contract: |
            Input: Raw XES log
            Witness: 'xes-1849' (explicit)
            Refusals: MalformedXesAttribute, InvalidXesTrace, etc.

    loss_interface:
      name: "wasm4pm:compat/loss@1.0.0"
      kind: "export"
      feature_gate: "formats"
      functions:

        - function: "project-ocel-to-xes"
          signature: |
            func(admitted: ocel-log, policy: loss-policy) ->
              result<record {
                xes-log: xes-log,
                report: loss-report,
              }, refusal-reason>
          contract: |
            Input: Admitted OCEL log, loss policy
            Policy modes:
              1. "refuse" — Reject any loss (fail if transformation loses data)
              2. "allow-named" — Allow loss, name it, emit LossReport
              3. "allow-with-report" — Unconditional; always emit report
            Output: XES log + mandatory loss report
            Refusal: InvalidLossPolicy if policy mismatches transformation

        - function: "project-xes-to-dfg"
          signature: |
            func(admitted: xes-log, policy: loss-policy) ->
              result<record {
                dfg-model: dfg-model,
                report: loss-report,
              }, refusal-reason>
          contract: "Similar to OCEL → XES; outputs directly-follows graph"

    strict_interface:
      name: "wasm4pm:compat/strict@1.0.0"
      kind: "export"
      feature_gate: "strict"
      functions:

        - function: "check-strict-boundary"
          signature: |
            func(boundary: process-boundary) ->
              result<bool, strict-violation>
          contract: |
            Input: Declared process boundary
            Checks:
              1. has-witness: boundary carries witness tag (or fail with MissingWitnessMarker)
              2. has-loss-policy: lossy operations documented (or fail with MissingLossPolicy)
              3. has-round-trip: bidirectional transformation attested (or fail with MissingRoundTrip)
            Output: true if all checks pass; strict-violation enum otherwise

    graduation_interface:
      name: "wasm4pm:compat/graduation@1.0.0"
      kind: "export"
      feature_gate: "wasm4pm"
      functions:

        - function: "graduate-to-wasm4pm"
          signature: |
            func(admitted: event-log) ->
              result<record {
                is-grounded: bool,
                reason: string,
              }, refusal-reason>
          contract: |
            Input: Fully admitted evidence (Evidence<T, Admitted, W>)
            Output: GraduationCandidate (grounded or ungrounded)
            Grounded: True → Engine can execute discovery/conformance/replay
            Ungrounded: False → Missing context (loss policy, refusal path, temporal data)
            Purpose: Signal when evidence is ready to cross into wasm4pm engine

    witness_metadata_interface:
      name: "wasm4pm:compat/witness-metadata@1.0.0"
      kind: "export"
      functions:

        - function: "get-witness-info"
          signature: |
            func(key: string) -> option<witness-info>
          contract: |
            Input: Witness key (e.g., 'ocel-2.0', 'xes-1849', 'wf-net-soundness-paper')
            Output: WitnessInfo struct OR null if not found
            Registry: ~40 witnesses (static, immutable)

        - function: "list-all-witnesses"
          signature: |
            func() -> list<witness-info>
          contract: "Returns all registered witnesses"

---

engine_wit_imports:

  description: "wasm4pm execution engine interfaces; imported by compat component"
  world_name: "wasm4pm:engine@1.0.0"

  interfaces:

    discovery_interface:
      name: "wasm4pm:engine/discovery@1.0.0"
      kind: "import"
      functions:

        - function: "discover-dfg"
          signature: |
            func(admitted: event-log) -> result<dfg-model, string>
          semantics: "Directly-follows graph discovery"

        - function: "discover-petri"
          signature: |
            func(admitted: event-log, method: string) -> result<petri-net, string>
          semantics: "Petri net discovery (alpha, inductive miner)"

        - function: "discover-bpmn"
          signature: |
            func(admitted: event-log) -> result<bpmn-model, string>
          semantics: "BPMN discovery (process tree conversion)"

    replay_interface:
      name: "wasm4pm:engine/replay@1.0.0"
      kind: "import"
      functions:

        - function: "replay-on-petri"
          signature: |
            func(admitted: event-log, model: petri-net) ->
              result<record {
                fitness: f64,
                moves-on-log: u32,
                moves-on-model: u32,
              }, string>
          semantics: "Token replay with move-on-log and move-on-model costs"

        - function: "align-on-petri"
          signature: |
            func(admitted: event-log, model: petri-net) ->
              result<record {
                cost: u32,
                alignment: list<string>,
              }, string>
          semantics: "Optimal alignment (A* search)"

    conformance_interface:
      name: "wasm4pm:engine/conformance@1.0.0"
      kind: "import"
      functions:

        - function: "check-conformance"
          signature: |
            func(admitted: event-log, model: process-model) ->
              result<list<metric>, string>
          semantics: "Fitness, precision, generalization, simplicity metrics"

    ocpq_interface:
      name: "wasm4pm:engine/ocpq@1.0.0"
      kind: "import"
      functions:

        - function: "query-object-lifecycle"
          signature: |
            func(admitted: ocel-log, object-id: string) ->
              result<list<record { event-id: string, timestamp: u64, activity: string }>, string>
          semantics: "Object-centric process query (lifecycle events for one object)"

        - function: "query-object-relations"
          signature: |
            func(admitted: ocel-log, object-id: string) ->
              result<list<string>, string>
          semantics: "Find related objects"

    receipts_interface:
      name: "wasm4pm:engine/receipts@1.0.0"
      kind: "import"
      functions:

        - function: "generate-receipt"
          signature: |
            func(admitted: event-log) -> result<string, string>
          semantics: "Cryptographic proof / hash of evidence"

        - function: "verify-receipt"
          signature: |
            func(admitted: event-log, receipt: string) -> result<bool, string>
          semantics: "Validate receipt against evidence"

---

