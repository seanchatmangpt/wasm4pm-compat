  compat_world:
    name: "wasm4pm:compat@1.0.0"
    definition: |
      package wasm4pm:compat@1.0.0;

      interface types { /* ... */ }
      interface admission { /* ... */ }
      interface loss { /* ... */ }
      interface strict { /* ... */ }
      interface graduation { /* ... */ }
      interface witness-metadata { /* ... */ }

      world compat {
        export types;
        export admission;
        export loss;        // feature=formats
        export strict;      // feature=strict
        export graduation;  // feature=wasm4pm
        export witness-metadata;
      }
    feature_variants:
      - "compat.wit (base: types, admission only)"
      - "compat-formats.wit (formats feature: +loss)"
      - "compat-strict.wit (strict feature: +strict)"
      - "compat-wasm4pm.wit (wasm4pm feature: +graduation)"
      - "compat-full.wit (all features)"

  engine_world:
    name: "wasm4pm:engine@1.0.0"
    definition: |
      package wasm4pm:engine@1.0.0;

      interface discovery { /* ... */ }
      interface replay { /* ... */ }
      interface conformance { /* ... */ }
      interface ocpq { /* ... */ }
      interface receipts { /* ... */ }

      world engine {
        import discovery;
        import replay;
        import conformance;
        import ocpq;
        import receipts;
      }
    feature_gate: "wasm4pm"
    purpose: "Execution engine interface; imported by compat when engine available"

---

witness_flow_at_component_boundary:

  principle: "Witness is metadata, not a phantom type in WIT; encoded as string tag"

  compat_boundary_encoding:
    description: |
      Returned records carry witness-id field:

      record admitted-event-log {
        value: event-log,
        witness-id: string,  // "ocel-2.0", "xes-1849", etc.
      }

  engine_consumption:
    description: |
      Engine receives witness-id in admitted log; uses it to determine
      semantic validation strategy.

  example_flow:
    - step: 1
      actor: "Component host (JavaScript)"
      action: "Call compat::admission::admit-ocel-log(raw-ocel)"
      result: |
        {
          value: { events: [...], objects: [...], ... },
          witness-id: "ocel-2.0",
        }

    - step: 2
      actor: "Component host"
      action: "Call engine::discovery::discover-petri(admitted)"
      result: |
        {
          places: [...],
          transitions: [...],
          arcs: [...],
        }
      note: "Witness implicitly available via witness-id in admitted"

    - step: 3
      actor: "Component host"
      action: "Call engine::conformance::check-conformance(admitted, petri-net)"
      result: |
        [
          { kind: "fitness", numerator: 95, denominator: 100, notes: "95%" },
          { kind: "precision", numerator: 87, denominator: 100, notes: "87%" },
        ]

---

refusal_encoding_at_boundary:

  principle: "Every refusal is a named variant of refusal-reason enum"

  variant_structure: |
    variant refusal-reason {
      dangling-event-object-link(record { ... }),
      missing-final-marking(record { ... }),
      invalid-petri-structure(record { ... }),
      circular-dependency(record { ... }),
      hidden-process-mining-growth(record { ... }),
      invalid-loss-policy(record { ... }),
      witness-mismatch(record { ... }),
    }

  enforcement: |
    Every result<T, refusal-reason> must return one of these variants.
    No bare strings; no generic "InvalidInput"; no untyped errors.
    Each variant carries context-specific payload (record of relevant IDs/flags).

  consumption_by_host: |
    Host code can match on variant:
      match result {
        Ok(admitted) => { /* process */ },
        Err(refusal-reason::dangling-event-object-link(ctx)) => {
          console.error(`Event ${ctx.event-id} references unknown object ${ctx.object-id}`);
        },
        Err(refusal-reason::witness-mismatch(ctx)) => {
          console.error(`Expected ${ctx.expected} but found ${ctx.found}`);
        },
        /* ... other variants ... */
      }

---

generated_wit_files:

  output_dir: "generated/wasm4pm-component-model"

  directory: "ggen/wit"

  files:
    - name: "types.wit"
      scope: "shared type definitions (always present)"
      contains: |
        - event-log, ocel-log, xes-log (records)
        - loss-report, process-boundary, witness-info (records)
        - lifecycle-state, witness-family (enums)
        - refusal-reason (variant)
        - metric (record)
      size_estimate: "~1 KB"

    - name: "compat.wit"
      scope: "base compat world (types + admission only)"
      contains: |
        - types interface
        - admission interface
      size_estimate: "~500 B"

    - name: "compat-formats.wit"
      scope: "compat world with loss (feature=formats)"
      contains: |
        - types interface
        - admission interface
        - loss interface
      size_estimate: "~800 B"

    - name: "compat-strict.wit"
      scope: "compat world with strict boundary (feature=strict)"
      contains: |
        - types interface
        - admission interface
        - strict interface
      size_estimate: "~600 B"

    - name: "compat-wasm4pm.wit"
      scope: "compat world with graduation bridge (feature=wasm4pm)"
      contains: |
        - types interface
        - admission interface
        - graduation interface
        - witness-metadata interface
      size_estimate: "~700 B"

    - name: "compat-full.wit"
      scope: "compat world with all features"
      contains: |
        - types, admission, loss, strict, graduation, witness-metadata interfaces
      size_estimate: "~1.2 KB"

    - name: "engine.wit"
      scope: "engine world (import only; feature=wasm4pm)"
      contains: |
        - discovery interface
        - replay interface
        - conformance interface
        - ocpq interface
        - receipts interface
      size_estimate: "~1 KB"

  audit_files:
    - name: "wit-validation.md"
      purpose: "Verify WIT syntax and world composition"
      checks: |
        - [ ] All .wit files parse without errors
        - [ ] All imported types are available in scope
        - [ ] No circular dependencies between worlds
        - [ ] refusal-reason variant covers all named laws
        - [ ] witness-family enum matches Witness trait families

    - name: "wit-conformance.md"
      purpose: "Cross-check WIT against Rust type definitions"
      checks: |
        - [ ] event-log WIT matches EventLog struct fields
        - [ ] ocel-log WIT matches OcelLog struct fields
        - [ ] refusal-reason variants match admission refusal enums
        - [ ] witness-info fields match Witness trait const metadata

